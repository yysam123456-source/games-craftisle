<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4facfe"/><stop offset="50%" stop-color="#87CEEB"/><stop offset="100%" stop-color="#98D8E8"/></linearGradient>
    <linearGradient id="pipeGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#228B22"/><stop offset="50%" stop-color="#32CD32"/><stop offset="100%" stop-color="#228B22"/></linearGradient>
    <linearGradient id="pipeCap" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b1a"/><stop offset="100%" stop-color="#2e8b2e"/></linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="700" cy="60" r="40" fill="#FFD700" opacity="0.6"/>
  <circle cx="700" cy="60" r="30" fill="#FFEA00" opacity="0.4"/>
  <!-- Clouds -->
  <g fill="white" opacity="0.8">
    <ellipse cx="130" cy="70" rx="70" ry="28"/><ellipse cx="180" cy="62" rx="52" ry="22"/><ellipse cx="90" cy="65" rx="42" ry="18"/>
    <ellipse cx="580" cy="100" rx="80" ry="30"/><ellipse cx="640" cy="94" rx="58" ry="24"/><ellipse cx="530" cy="96" rx="46" ry="18"/>
    <ellipse cx="350" cy="45" rx="50" ry="20" opacity="0.5"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="400" width="800" height="50" fill="#DEB887"/>
  <rect x="0" y="400" width="800" height="6" fill="#8B4513"/>
  <rect x="0" y="406" width="800" height="44" fill="none" stroke="#CD853F" stroke-width="1" opacity="0.3"/>
  <!-- Ground grass tufts -->
  <g fill="#228B22" opacity="0.5">
    <polygon points="30,400 35,388 40,400"/><polygon points="120,400 126,385 132,400"/><polygon points="250,400 256,390 262,400"/>
    <polygon points="480,400 486,388 492,400"/><polygon points="620,400 626,385 632,400"/><polygon points="750,400 756,390 762,400"/>
  </g>
  <!-- Pipes set 1 -->
  <g>
    <rect x="250" y="0" width="56" rx="6" height="260" fill="url(#pipeGrad)"/>
    <rect x="244" y="255" width="68" rx="4" height="16" fill="url(#pipeCap)"/>
    <rect x="250" y="315" width="56" rx="6" height="135" fill="url(#pipeGrad)"/>
    <rect x="244" y="308" width="68" rx="4" height="16" fill="url(#pipeCap)"/>
  </g>
  <!-- Pipes set 2 -->
  <g>
    <rect x="500" y="0" width="56" rx="6" height="210" fill="url(#pipeGrad)"/>
    <rect x="494" y="205" width="68" rx="4" height="16" fill="url(#pipeCap)"/>
    <rect x="500" y="365" width="56" rx="6" height="85" fill="url(#pipeGrad)"/>
    <rect x="494" y="358" width="68" rx="4" height="16" fill="url(#pipeCap)"/>
  </g>
  <!-- Bird (Flappy) -->
  <g transform="translate(170, 270)">
    <ellipse cx="22" cy="17" rx="22" ry="17" fill="#FFD700"/>
    <ellipse cx="22" cy="17" rx="18" ry="13" fill="#FFA500"/>
    <circle cx="31" cy="12" r="6" fill="white"/>
    <circle cx="33" cy="12" r="3" fill="#000"/>
    <polygon points="37,14 50,17 37,20" fill="#FF6B35"/>
    <!-- Wing up -->
    <ellipse cx="13" cy="7" rx="12" ry="7" fill="#FFD700" opacity="0.85"/>
    <!-- Tail -->
    <ellipse cx="3" cy="17" rx="6" ry="4" fill="#FF6B35"/>
    <!-- Eye highlight -->
    <circle cx="32" cy="11" r="1.5" fill="#fff"/>
  </g>
  <!-- Score display mockup -->
  <rect x="340" y="30" width="120" height="40" rx="8" fill="white" opacity="0.3"/>
  <text x="400" y="57" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="22" fill="white" opacity="0.5">0</text>
  <text x="400" y="440" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="12" fill="#228B22" opacity="0.3" letter-spacing="4">FLAPPY WINGS</text>
</svg>