<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Wings - Play Free Online</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: auto; 
      background: linear-gradient(180deg, #71c5cf 0%, #e0f7fa 100%);
      font-family: 'Arial', sans-serif;
    }
    .game-wrapper {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { 
      color: #333; 
      margin-bottom: 20px;
      font-size: 2.5em;
    }
    canvas { 
      border: 4px solid #333;
      background: linear-gradient(180deg, #71c5cf 0%, #e0f7fa 100%);
      border-radius: 10px;
      display: block;
      margin: 0 auto;
    }
    .score-board {
      margin-top: 20px;
      font-size: 1.5em;
      color: #667eea;
      font-weight: bold;
    }
    .instructions {
      margin-top: 15px;
      color: #666;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>🐦 Flappy Wings</h1>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="score-board">Score: <span id="score">0</span> | Best: <span id="best">0</span></div>
    <div class="instructions">Click or Press Space to Flap! Don't hit the pipes!</div>
  </div>
  
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const bestElement = document.getElementById('best');
    
    let bird = {
      x: 80,
      y: canvas.height / 2,
      radius: 20,
      velocity: 0,
      gravity: 0.5,
      jump: -10
    };
    
    let pipes = [];
    let score = 0;
    let best = localStorage.getItem('flappyBest') || 0;
    let gameStarted = false;
    let gameOver = false;
    let frameCount = 0;
    
    bestElement.textContent = best;
    
    function createPipe() {
      const gap = 150;
      const pipeWidth = 60;
      const minHeight = 50;
      const maxHeight = canvas.height - gap - minHeight;
      const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
      
      return {
        x: canvas.width,
        topHeight: topHeight,
        bottomY: topHeight + gap,
        width: pipeWidth,
        passed: false
      };
    }
    
    function drawBird() {
      // Draw bird body
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#FFA500';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Draw eye
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(bird.x + 8, bird.y - 5, 6, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = 'black';
      ctx.beginPath();
      ctx.arc(bird.x + 10, bird.y - 5, 3, 0, Math.PI * 2);
      ctx.fill();
      
      // Draw beak
      ctx.fillStyle = '#FF6B6B';
      ctx.beginPath();
      ctx.moveTo(bird.x + bird.radius - 5, bird.y);
      ctx.lineTo(bird.x + bird.radius + 10, bird.y - 5);
      ctx.lineTo(bird.x + bird.radius + 10, bird.y + 5);
      ctx.closePath();
      ctx.fill();
      
      // Draw wing
      ctx.fillStyle = '#FFA500';
      ctx.beginPath();
      ctx.ellipse(bird.x - 5, bird.y + 5, 12, 6, Math.PI / 4, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function drawPipes() {
      pipes.forEach(pipe => {
        // Top pipe
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
        
        // Top pipe cap
        ctx.fillStyle = '#388E3C';
        ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, pipe.width + 10, 30);
        
        // Bottom pipe
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, canvas.height - pipe.bottomY);
        
        // Bottom pipe cap
        ctx.fillStyle = '#388E3C';
        ctx.fillRect(pipe.x - 5, pipe.bottomY, pipe.width + 10, 30);
      });
    }
    
    function updateGame() {
      if (!gameStarted || gameOver) return;
      
      frameCount++;
      
      // Update bird
      bird.velocity += bird.gravity;
      bird.y += bird.velocity;
      
      // Check boundaries
      if (bird.y + bird.radius >= canvas.height || bird.y - bird.radius <= 0) {
        endGame();
        return;
      }
      
      // Create new pipes
      if (frameCount % 90 === 0) {
        pipes.push(createPipe());
      }
      
      // Update pipes
      pipes.forEach((pipe, index) => {
        pipe.x -= 3;
        
        // Check collision
        if (
          bird.x + bird.radius > pipe.x &&
          bird.x - bird.radius < pipe.x + pipe.width &&
          (bird.y - bird.radius < pipe.topHeight || bird.y + bird.radius > pipe.bottomY)
        ) {
          endGame();
          return;
        }
        
        // Check if passed
        if (!pipe.passed && pipe.x + pipe.width < bird.x) {
          pipe.passed = true;
          score++;
          scoreElement.textContent = score;
        }
        
        // Remove off-screen pipes
        if (pipe.x + pipe.width < 0) {
          pipes.splice(index, 1);
        }
      });
    }
    
    function drawGame() {
      // Clear canvas
      ctx.fillStyle = '#71c5cf';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw clouds
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.beginPath();
      ctx.arc(100, 100, 30, 0, Math.PI * 2);
      ctx.arc(130, 100, 40, 0, Math.PI * 2);
      ctx.arc(160, 100, 30, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.beginPath();
      ctx.arc(300, 200, 25, 0, Math.PI * 2);
      ctx.arc(325, 200, 35, 0, Math.PI * 2);
      ctx.arc(350, 200, 25, 0, Math.PI * 2);
      ctx.fill();
      
      drawPipes();
      drawBird();
      
      // Draw start message
      if (!gameStarted) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 36px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Click to Start!', canvas.width / 2, canvas.height / 2);
        ctx.font = '24px Arial';
        ctx.fillText('Press Space or Click to Flap', canvas.width / 2, canvas.height / 2 + 50);
      }
      
      // Draw game over
      if (gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#FF6B6B';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2 - 30);
        ctx.font = '24px Arial';
        ctx.fillStyle = 'white';
        ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
        ctx.fillText('Click to Restart', canvas.width / 2, canvas.height / 2 + 60);
      }
    }
    
    function flap() {
      if (gameOver) {
        resetGame();
        return;
      }
      
      if (!gameStarted) {
        gameStarted = true;
      }
      
      bird.velocity = bird.jump;
    }
    
    function resetGame() {
      bird.y = canvas.height / 2;
      bird.velocity = 0;
      pipes = [];
      score = 0;
      scoreElement.textContent = score;
      gameOver = false;
      gameStarted = false;
      frameCount = 0;
    }
    
    function endGame() {
      gameOver = true;
      
      if (score > best) {
        best = score;
        localStorage.setItem('flappyBest', best);
        bestElement.textContent = best;
      }
    }
    
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        flap();
      }
    });
    
    canvas.addEventListener('click', flap);
    
    setInterval(() => {
      updateGame();
      drawGame();


  
</script>
</body>
</html>
