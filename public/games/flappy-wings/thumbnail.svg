<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f7fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sky)" rx="16"/>
  <!-- Ground -->
  <rect x="0" y="240" width="400" height="60" fill="#81c784" rx="0 0 16 16"/>
  <rect x="0" y="235" width="400" height="15" fill="#a5d6a7"/>
  <!-- Pipes (green) -->
  <rect x="250" y="60" width="35" height="185" rx="6" fill="#43a047" stroke="#2e7d32" stroke-width="2"/>
  <rect x="320" y="110" width="35" height="135" rx="6" fill="#43a047" stroke="#2e7d32" stroke-width="2"/>
  <!-- Pipe openings -->
  <ellipse cx="267" cy="68" rx="13" ry="8" fill="#2e7d32"/>
  <ellipse cx="337" cy="118" rx="13" ry="8" fill="#2e7d32"/>
  <!-- Bird (yellow/orange) -->
  <g transform="translate(130,145)">
    <!-- Body -->
    <ellipse cx="25" cy="20" rx="22" ry="16" fill="#ffc107"/>
    <!-- Head -->
    <circle cx="45" cy="10" r="14" fill="#ffc107"/>
    <!-- Eye -->
    <circle cx="51" cy="7" r="3.5" fill="#333"/>
    <circle cx="52" cy="6" r="1.2" fill="white"/>
    <!-- Beak -->
    <polygon points="58,9 72,11 58,14" fill="#ff9800"/>
    <!-- Wing -->
    <ellipse cx="18" cy="18" rx="16" ry="10" fill="#ffb300"/>
    <!-- Tail feathers -->
    <polygon points="3,15 -8,8 3,22" fill="#ff9800"/>
  </g>
  <!-- Clouds -->
  <ellipse cx="70" cy="45" rx="35" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="50" cy="52" rx="25" ry="14" fill="white" opacity="0.85"/>
  <ellipse cx="340" cy="50" rx="30" ry="15" fill="white" opacity="0.8"/>
  <!-- Score -->
  <text x="200" y="33" font-family="Arial,sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Score: 0  |  Best: --</text>
  <!-- Title -->
  <text x="200" y="278" font-family="Arial,sans-serif" font-size="30" font-weight="bold" text-anchor="middle" fill="#ff8f00">🐦 Flappy Wings</text>
</svg>
