<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Sudoku grid 3x3 with inner lines -->
  <g transform="translate(110,30)">
    <!-- Outer border -->
    <rect x="0" y="0" width="180" height="180" fill="white" stroke="#333" stroke-width="3" rx="4"/>
    <!-- Thick grid lines every 3 cells -->
    <line x1="60" y1="0" x2="60" y2="180" stroke="#333" stroke-width="2.5"/>
    <line x1="120" y1="0" x2="120" y2="180" stroke="#333" stroke-width="2.5"/>
    <line x1="0" y1="60" x2="180" y2="60" stroke="#333" stroke-width="2.5"/>
    <line x1="0" y1="120" x2="180" y2="120" stroke="#333" stroke-width="2.5"/>
    <!-- Thin grid lines -->
    <line x1="20" y1="0" x2="20" y2="180" stroke="#ccc" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="180" stroke="#ccc" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="180" stroke="#ccc" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="180" stroke="#ccc" stroke-width="1"/>
    <line x1="140" y1="0" x2="140" y2="180" stroke="#ccc" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="180" stroke="#ccc" stroke-width="1"/>
    <line x1="0" y1="20" x2="180" y2="20" stroke="#ccc" stroke-width="1"/>
    <line x1="0" y1="40" x2="180" y2="40" stroke="#ccc" stroke-width="1"/>
    <line x1="0" y1="80" x2="180" y2="80" stroke="#ccc" stroke-width="1"/>
    <line x1="0" y1="100" x2="180" y2="100" stroke="#ccc" stroke-width="1"/>
    <line x1="0" y1="140" x2="180" y2="140" stroke="#ccc" stroke-width="1"/>
    <line x1="0" y1="160" x2="180" y2="160" stroke="#ccc" stroke-width="1"/>
    <!-- Sample numbers -->
    <text x="30" y="32" font-family="Georgia,serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1565c0">5</text>
    <text x="50" y="72" font-family="Georgia,serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1565c0">3</text>
    <text x="90" y="52" font-family="Georgia,serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1565c0">9</text>
    <text x="130" y="32" font-family="Georgia,serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1565c0">7</text>
    <text x="10" y="112" font-family="Georgia,serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1565c0">1</text>
    <text x="70" y="132" font-family="Georgia,serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1565c0">4</text>
    <text x="150" y="112" font-family="Georgia,serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1565c0">8</text>
    <text x="30" y="172" font-family="Georgia,serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1565c0">2</text>
    <text x="110" y="172" font-family="Georgia,serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1565c0">6</text>
  </g>
  <!-- Title -->
  <text x="200" y="265" font-family="Georgia,serif" font-size="34" font-weight="bold" text-anchor="middle" fill="#1565c0">SUDOKU</text>
</svg>
