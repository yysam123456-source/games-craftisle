    <path d="M83.33 0v270 M166.67 0v270 M0 90h250 M0 180h250" stroke="#333" stroke-width="2.5"/>
    <!-- Numbers -->
    <g font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#1a73e8">
