      <text x="125" y="125" text-anchor="middle" fill="#333">1</text>
      <text x="208.33" y="125" text-anchor="middle" fill="#333">9</text>
      <text x="125" y="185" text-anchor="middle" fill="#333">8</text>
      <text x="41.67" y="245" text-anchor="middle" fill="#333">4</text>
      <text x="208.33" y="245" text-anchor="middle" fill="#333">2</text>
      <text x="125" y="245" text-anchor="middle" fill="#1a73e8">9</text>
    </g>
  </g>
  <!-- Decorative floating numbers -->
  <g font-family="Georgia,serif" font-weight="bold" opacity="0.08" font-size="60">
    <text x="60" y="380" fill="#1a73e8">1</text>
