<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" />
  
  <!-- Title -->
  <text x="200" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">✨</text>
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Infinite Craft</text>
  
  <!-- Elements -->
  <text x="80" y="220" font-size="40" text-anchor="middle">💧</text>
  <text x="160" y="220" font-size="40" text-anchor="middle">🔥</text>
  <text x="240" y="220" font-size="40" text-anchor="middle">🌬️</text>
  <text x="320" y="220" font-size="40" text-anchor="middle">🌍</text>
  
  <!-- Plus signs -->
  <text x="120" y="220" font-size="30" fill="white" text-anchor="middle">+</text>
  <text x="200" y="220" font-size="30" fill="white" text-anchor="middle">+</text>
  <text x="280" y="220" font-size="30" fill="white" text-anchor="middle">+</text>
  
  <!-- Subtitle -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle">Combine Elements to Discover New Ones</text>
</svg>
