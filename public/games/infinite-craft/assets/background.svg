<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f0c29"/><stop offset="50%" stop-color="#302b63"/><stop offset="100%" stop-color="#24243e"/></linearGradient>
    <radialGradient id="glow"><stop offset="0%" stop-color="rgba(255,255,255,0.2)"/><stop offset="100%" stop-color="transparent"/></radialGradient>
    <filter id="elemGlow"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Background glow blobs -->
  <circle cx="200" cy="150" r="120" fill="#3b82f6" opacity="0.06"/>
  <circle cx="600" cy="300" r="140" fill="#a78bfa" opacity="0.06"/>
  <circle cx="400" cy="380" r="100" fill="#22c55e" opacity="0.05"/>
  <!-- Base elements (large) -->
  <g filter="url(#elemGlow)">
    <!-- Water -->
    <g transform="translate(120,100)">
      <circle cx="50" cy="22" r="48" fill="url(#glow)"/>
      <rect x="0" y="0" width="100" height="44" rx="22" fill="#3b82f6" opacity="0.9"/>
      <text x="50" y="29" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">Water 💧</text>
    </g>
    <!-- Fire -->
    <g transform="translate(280,140)">
      <circle cx="44" cy="20" r="44" fill="url(#glow)"/>
      <rect x="0" y="0" width="88" height="40" rx="20" fill="#ef4444" opacity="0.9"/>
      <text x="44" y="27" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="white">Fire 🔥</text>
    </g>
    <!-- Wind -->
    <g transform="translate(450,110)">
      <circle cx="40" cy="18" r="40" fill="url(#glow)"/>
      <rect x="0" y="0" width="80" height="36" rx="18" fill="#a78bfa" opacity="0.85"/>
      <text x="40" y="24" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">Wind 🌬️</text>
    </g>
    <!-- Earth -->
    <g transform="translate(320,240)">
      <circle cx="46" cy="21" r="46" fill="url(#glow)"/>
      <rect x="0" y="0" width="92" height="42" rx="21" fill="#22c55e" opacity="0.9"/>
      <text x="46" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="white">Earth 🌍</text>
    </g>
    <!-- Combined elements -->
    <g transform="translate(200,320)">
      <circle cx="54" cy="24" r="54" fill="url(#glow)"/>
      <rect x="0" y="0" width="108" height="48" rx="24" fill="#f59e0b" opacity="0.92"/>
      <text x="54" y="31" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="white">Steam 💨</text>
    </g>
    <g transform="translate(520,300)">
      <circle cx="48" cy="22" r="48" fill="url(#glow)"/>
      <rect x="0" y="0" width="96" height="44" rx="22" fill="#06b6d4" opacity="0.88"/>
      <text x="48" y="29" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="white">Lava 🌋</text>
    </g>
    <g transform="translate(620,180)">
      <rect x="0" y="0" width="96" height="44" rx="22" fill="#ec4899" opacity="0.75"/>
      <text x="48" y="29" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">Mud 🏜️</text>
    </g>
  </g>
  <!-- Connection lines -->
  <g stroke="white" stroke-width="0.8" stroke-dasharray="5 5" opacity="0.12">
    <line x1="220" y1="122" x2="324" y2="160"/><line x1="368" y1="162" x2="394" y2="240"/>
    <line x1="320" y1="162" x2="490" y2="128"/><line x1="412" y1="261" x2="254" y2="320"/>
  </g>
  <text x="400" y="412" text-anchor="middle" font-family="sans-serif" font-size="18" fill="white" opacity="0.12" letter-spacing="6">∞ INFINITE CRAFT</text>
</svg>