<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris - Play Free Online</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Courier New', monospace;
    }
    .game-wrapper {
      display: flex;
      gap: 30px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .game-board {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { 
      color: #333; 
      margin-bottom: 20px;
      font-size: 2em;
      text-align: center;
    }
    canvas { 
      border: 4px solid #333;
      background: #000;
      border-radius: 10px;
    }
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 200px;
    }
    .info-box {
      background: #f0f0f0;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    .info-box h3 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 1.2em;
    }
    .info-box p {
      font-size: 2em;
      font-weight: bold;
      color: #333;
    }
    .controls {
      margin-top: 20px;
      color: #666;
      font-size: 0.9em;
      text-align: center;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 1.2em;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
      font-family: 'Courier New', monospace;
    }
    button:hover {
      background: #764ba2;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="game-board">
      <h1>🧱 Tetris</h1>
      <canvas id="gameCanvas" width="300" height="600"></canvas>
      <div class="controls">
        ← → Move | ↑ Rotate | ↓ Drop Fast<br>
        Space = Instant Drop
      </div>
    </div>
    
    <div class="side-panel">
      <div class="info-box">
        <h3>Score</h3>
        <p id="score">0</p>
      </div>
      
      <div class="info-box">
        <h3>Level</h3>
        <p id="level">1</p>
      </div>
      
      <div class="info-box">
        <h3>Lines</h3>
        <p id="lines">0</p>
      </div>
      
      <div class="info-box">
        <h3>Next</h3>
        <canvas id="nextCanvas" width="120" height="120"></canvas>
      </div>
      
      <button id="startBtn">Start Game</button>
    </div>
  </div>
  
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('nextCanvas');
    const nextCtx = nextCanvas.getContext('2d');
    
    const scoreElement = document.getElementById('score');
    const levelElement = document.getElementById('level');
    const linesElement = document.getElementById('lines');
    const startBtn = document.getElementById('startBtn');
    
    const COLS = 10;
    const ROWS = 20;
    const BLOCK_SIZE = 30;
    
    const COLORS = [
      '#000000', // 0: empty
      '#00FFFF', // 1: I - Cyan
      '#0000FF', // 2: J - Blue
      '#FFA500', // 3: L - Orange
      '#FFFF00', // 4: O - Yellow
      '#00FF00', // 5: S - Green
      '#800080', // 6: T - Purple
      '#FF0000', // 7: Z - Red
    ];
    
    const SHAPES = [
      [], // 0: empty
      [[1,1,1,1]], // I
      [[2,0,0],[2,2,2]], // J
      [[0,0,3],[3,3,3]], // L
      [[4,4],[4,4]], // O
      [[0,5,5],[5,5,0]], // S
      [[0,6,0],[6,6,6]], // T
      [[7,7,0],[0,7,7]], // Z
    ];
    
    let board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
    let currentPiece = null;
    let nextPiece = null;
    let score = 0;
    let level = 1;
    let lines = 0;
    let gameLoop = null;
    let isPlaying = false;
    
    function createPiece() {
      const type = Math.floor(Math.random() * 7) + 1;
      const shape = SHAPES[type];
      return {
        type: type,
        shape: shape,
        x: Math.floor((COLS - shape[0].length) / 2),
        y: 0
      };
    }
    
    function drawBlock(ctx, x, y, colorIdx) {
      ctx.fillStyle = COLORS[colorIdx];
      ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
      ctx.strokeStyle = '#000';
      ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
    }
    
    function drawBoard() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 绘制网格线
      ctx.strokeStyle = '#1a1a2e';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * BLOCK_SIZE, 0);
        ctx.lineTo(x * BLOCK_SIZE, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * BLOCK_SIZE);
        ctx.lineTo(canvas.width, y * BLOCK_SIZE);
        ctx.stroke();
      }
      
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x]) {
            drawBlock(ctx, x, y, board[y][x]);
          }
        }
      }
      
      if (currentPiece) {
        currentPiece.shape.forEach((row, dy) => {
          row.forEach((value, dx) => {
            if (value) {
              drawBlock(ctx, currentPiece.x + dx, currentPiece.y + dy, currentPiece.type);
            }
          });
        });
      }
    }
    
    function drawNextPiece() {
      nextCtx.fillStyle = '#f0f0f0';
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      
      if (nextPiece) {
        const offsetX = (4 - nextPiece.shape[0].length) / 2;
        const offsetY = (4 - nextPiece.shape.length) / 2;
        
        nextPiece.shape.forEach((row, dy) => {
          row.forEach((value, dx) => {
            if (value) {
              nextCtx.fillStyle = COLORS[nextPiece.type];
              nextCtx.fillRect((offsetX + dx) * 30, (offsetY + dy) * 30, 29, 29);
            }
          });
        });
      }
    }
    
    function movePiece(dx, dy) {
      currentPiece.x += dx;
      currentPiece.y += dy;
      
      if (checkCollision()) {
        currentPiece.x -= dx;
        currentPiece.y -= dy;
        return false;
      }
      return true;
    }
    
    function rotatePiece() {
      const oldShape = currentPiece.shape;
      const rows = oldShape.length;
      const cols = oldShape[0].length;
      const newShape = Array(cols).fill(null).map(() => Array(rows).fill(0));
      
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          newShape[x][rows - 1 - y] = oldShape[y][x];
        }
      }
      
      currentPiece.shape = newShape;
      
      if (checkCollision()) {
        currentPiece.shape = oldShape;
        return false;
      }
      return true;
    }
    
    function checkCollision() {
      return currentPiece.shape.some((row, dy) => {
        return row.some((value, dx) => {
          if (!value) return false;
          
          const newX = currentPiece.x + dx;
          const newY = currentPiece.y + dy;
          
          return newX < 0 || newX >= COLS || newY >= ROWS || 
                 (newY >= 0 && board[newY][newX]);
        });
      });
    }
    
    function lockPiece() {
      currentPiece.shape.forEach((row, dy) => {
        row.forEach((value, dx) => {
          if (value) {
            const y = currentPiece.y + dy;
            const x = currentPiece.x + dx;
            if (y >= 0) {
              board[y][x] = currentPiece.type;
            }
          }
        });
      });
      
      clearLines();
      currentPiece = nextPiece;
      nextPiece = createPiece();
      
      if (checkCollision()) {
        gameOver();
      }
    }
    
    function clearLines() {
      let linesCleared = 0;
      
      for (let y = ROWS - 1; y >= 0; y--) {
        if (board[y].every(cell => cell !== 0)) {
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(0));
          linesCleared++;
          y++; // Re-check the same row
        }
      }
      
      if (linesCleared > 0) {
        lines += linesCleared;
        score += [0, 100, 300, 500, 800][linesCleared] * level;
        level = Math.floor(lines / 10) + 1;
        
        scoreElement.textContent = score;
        levelElement.textContent = level;
        linesElement.textContent = lines;
      }
    }
    
    function dropPiece() {
      if (!movePiece(0, 1)) {
        lockPiece();
      }
    }
    
    function gameOver() {
      isPlaying = false;
      clearInterval(gameLoop);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#FF0000';
      ctx.font = 'bold 48px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
      startBtn.textContent = 'Play Again';
      startBtn.style.display = 'block';
    }
    
    function startGame() {
      board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
      score = 0;
      lines = 0;
      level = 1;
      isPlaying = true;
      
      scoreElement.textContent = score;
      linesElement.textContent = lines;
      levelElement.textContent = level;
      
      currentPiece = createPiece();
      nextPiece = createPiece();
      
      startBtn.style.display = 'none';
      
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(() => {
        dropPiece();
        drawBoard();
        drawNextPiece();
      }, 1000 - (level - 1) * 100);
    }
    
    document.addEventListener('keydown', (e) => {
      if (!isPlaying) return;
      
      switch(e.key) {
        case 'ArrowLeft':
          movePiece(-1, 0);
          break;
        case 'ArrowRight':
          movePiece(1, 0);
          break;
        case 'ArrowDown':
          movePiece(0, 1);
          break;
        case 'ArrowUp':
          rotatePiece();
          break;
        case ' ':
          while (movePiece(0, 1)) {}
          break;
      }
      
      drawBoard();
    });
    
    // 自动开始游戏（页面加载即玩，不需要点击按钮）
    startBtn.addEventListener('click', () => {
      if (!isPlaying) startGame();
    });
    startGame();

  

</script>
</body>
</html>
