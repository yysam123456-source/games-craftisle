<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="spaceBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0a2e" stop-opacity="1"/>
      <stop offset="40%" stop-color="#0d0618" stop-opacity="1"/>
      <stop offset="100%" stop-color="#020108" stop-opacity="1"/>
    </radialGradient>
    <!-- Star field pattern -->
    <pattern id="stars" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="30" r="0.8" fill="#fff" opacity="0.6"/>
      <circle cx="80" cy="15" r="0.5" fill="#fff" opacity="0.4"/>
      <circle cx="150" cy="50" r="1" fill="#fff" opacity="0.7"/>
      <circle cx="45" cy="90" r="0.6" fill="#fff" opacity="0.3"/>
      <circle cx="120" cy="120" r="0.7" fill="#fff" opacity="0.5"/>
      <circle cx="180" cy="80" r="0.4" fill="#fff" opacity="0.4"/>
      <circle cx="10" cy="160" r="0.9" fill="#fff" opacity="0.6"/>
      <circle cx="70" cy="180" r="0.5" fill="#fff" opacity="0.3"/>
      <circle cx="140" cy="175" r="0.6" fill="#fff" opacity="0.5"/>
      <circle cx="190" cy="140" r="0.8" fill="#fff" opacity="0.4"/>
    </pattern>
    <!-- Retro alien pattern -->
    <pattern id="alienPattern" width="120" height="140" patternUnits="userSpaceOnUse">
      <g opacity="0.03" fill="#22c55e">
        <!-- Alien head shape -->
        <ellipse cx="60" cy="50" rx="25" ry="30"/>
        <ellipse cx="52" cy="42" rx="7" ry="10"/>
        <ellipse cx="68" cy="42" rx="7" ry="10"/>
        <!-- UFO shape -->
        <ellipse cx="60" cy="105" rx="30" ry="8"/>
        <ellipse cx="60" cy="98" rx="16" ry="10"/>
      </g>
    </pattern>
    <!-- Pixel invaders pattern -->
    <pattern id="invaderPattern" width="80" height="80" patternUnits="userSpaceOnUse">
      <g opacity="0.02" fill="#ef4444">
        <!-- Classic invader pixel art -->
        <rect x="24" y="8" width="8" height="8" rx="1"/>
        <rect x="48" y="8" width="8" height="8" rx="1"/>
        <rect x="16" y="16" width="48" height="8" rx="1"/>
        <rect x="8" y="24" width="64" height="8" rx="1"/>
        <rect x="8" y="32" width="16" height="8" rx="1"/>
        <rect x="32" y="32" width="16" height="8" rx="1"/>
        <rect x="56" y="32" width="16" height="8" rx="1"/>
        <rect x="8" y="40" width="64" height="8" rx="1"/>
        <rect x="16" y="48" width="8" height="8" rx="1"/>
        <rect x="56" y="48" width="8" height="8" rx="1"/>
        <rect x="24" y="56" width="8" height="8" rx="1"/>
        <rect x="48" y="56" width="8" height="8" rx="1"/>
      </g>
    </pattern>
    <!-- Glow filter -->
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nebula" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="1920" height="1080" fill="url(#spaceBg)"/>

  <!-- Nebula clouds -->
  <ellipse cx="300" cy="200" rx="350" ry="250" fill="#7c3aed" opacity="0.04" filter="url(#nebula)"/>
  <ellipse cx="1600" cy="800" rx="400" ry="280" fill="#2563eb" opacity="0.03" filter="url(#nebula)"/>
  <ellipse cx="960" cy="500" rx="500" ry="300" fill="#dc2626" opacity="0.02" filter="url(#nebula)"/>

  <!-- Star field -->
  <rect width="1920" height="1080" fill="url(#stars)"/>

  <!-- Extra bright stars with twinkle animation -->
  <g filter="url(#starGlow)">
    <circle cx="200" cy="150" r="1.5" fill="#fff" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="80" r="2" fill="#fef3c7" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="200" r="1.5" fill="#bfdbfe" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="1200" cy="120" r="2" fill="#fff" opacity="0.85"><animate attributeName="opacity" values="0.85;0.3;0.85" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1550" cy="180" r="1.5" fill="#fecdd3" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1750" cy="350" r="1.8" fill="#fff" opacity="0.8"><animate attributeName="opacity" values="0.8;0.25;0.8" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="600" r="1.5" fill="#e0e7ff" opacity="0.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1400" cy="500" r="2" fill="#fef3c7" opacity="0.75"><animate attributeName="opacity" values="0.75;0.2;0.75" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="800" r="1.5" fill="#fff" opacity="0.65"><animate attributeName="opacity" values="0.65;0.2;0.65" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1800" cy="700" r="1.8" fill="#bfdbfe" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="900" r="1.5" fill="#fff" opacity="0.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="3.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Retro patterns overlay -->
  <rect width="1920" height="1080" fill="url(#alienPattern)"/>
  <rect width="1920" height="1080" fill="url(#invaderPattern)"/>

  <!-- Shooting star -->
  <g opacity="0.4">
    <line x1="1400" y1="100" x2="1650" y2="200" stroke="url(#shootingStar)" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" from="0,0 to="300,150" dur="8s" repeatCount="indefinite"/>
    </line>
  </g>
  <defs>
    <linearGradient id="shootingStar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="80%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Planet silhouette (like a moon) -->
  <circle cx="1650" cy="150" r="80" fill="#fef3c7" opacity="0.04" filter="url(#nebula)"/>
  <circle cx="1650" cy="150" r="78" fill="#fef3c7" opacity="0.03"/>

  <!-- Scan line effect (subtle CRT feel) -->
  <g opacity="0.015">
    {Array.from({length:54}, (_,i)=>
      `<line key={i} x1="0" y1={i*20} x2="1920" y2={i*20} stroke="#fff" stroke-width="0.5"/>`
    ).join('')}
  </g>

  <!-- Border vignette -->
  <rect width="1920" height="1080" fill="none" stroke="#000" strokeWidth="0" style="box-shadow: inset 0 0 200px rgba(0,0,0,0.5);"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="50%" stop-color="transparent" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#vignette)" pointer-events="none"/>
</svg>