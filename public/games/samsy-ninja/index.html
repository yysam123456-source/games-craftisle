        <script>
        // ====================================================
        // 本地运行适配补丁
        // ====================================================

        // 1) Bypass tutorial - mark tutorial as completed
        try {
          var q = JSON.parse(localStorage.getItem('smsy_quests'));
          if (!q) q = {};
          q.TUTORIAL = true;
          localStorage.setItem('smsy_quests', JSON.stringify(q));
        } catch(e) {}

        // 2) Inject required query params (preserve any already present):
        //    - forceWebGL=true : skip WebGPU (may fail on some browsers)
        //    - cdn=false       : load videos from local /videos/ instead of remote CDN (403)
        (function() {
          var p = new URLSearchParams(window.location.search);
          var changed = false;
          if (p.get('forceWebGL') !== 'true') { p.set('forceWebGL', 'true'); changed = true; }
          if (p.get('cdn') === null)          { p.set('cdn', 'false');        changed = true; }
          if (changed) {
            var qs = p.toString();
            window.location.replace(window.location.pathname + (qs ? '?' + qs : ''));
          }
        })();
        </script>
