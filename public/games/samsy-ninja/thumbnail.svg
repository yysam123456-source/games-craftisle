<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="snBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#14101e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="glowRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff0033" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff0033" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff0033" stop-opacity="0"/>
    </linearGradient>
    <filter id="neon"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="640" height="360" fill="url(#snBg)"/>

  <!-- Grid lines for 3D feel -->
  <g opacity="0.08">
    <line x1="0" y1="90" x2="640" y2="90" stroke="#3a3a5c" stroke-width="1"/>
    <line x1="0" y1="180" x2="640" y2="180" stroke="#3a3a5c" stroke-width="1"/>
    <line x1="0" y1="270" x2="640" y2="270" stroke="#3a3a5c" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="360" stroke="#3a3a5c" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="360" stroke="#3a3a5c" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="360" stroke="#3a3a5c" stroke-width="1"/>
  </g>

  <!-- Central glow -->
  <circle cx="320" cy="160" r="100" fill="url(#glowRed)" filter="url(#softGlow)"/>

  <!-- Ninja figure (stylized silhouette) -->
  <g transform="translate(320, 155)" opacity="0.9">
    <!-- Body -->
    <path d="M-12,30 L-18,60 L-10,65 L10,65 L18,60 L12,30 Z" fill="#1a1a2e" stroke="#ff0033" stroke-width="1.5" filter="url(#neon)"/>
    <!-- Head -->
    <circle cx="0" cy="10" r="18" fill="#1a1a2e" stroke="#ff0033" stroke-width="1.5" filter="url(#neon)"/>
    <!-- Mask slit -->
    <ellipse cx="0" cy="8" rx="10" ry="3" fill="none" stroke="#ff0033" stroke-width="1.5" opacity="0.7"/>
    <!-- Eyes -->
    <circle cx="-5" cy="5" r="2" fill="#ff0033" filter="url(#neon)"/>
    <circle cx="5" cy="5" r="2" fill="#ff0033" filter="url(#neon)"/>
    <!-- Arms -->
    <line x1="-18" y1="35" x2="-35" y2="55" stroke="#ff0033" stroke-width="2" stroke-linecap="round" filter="url(#neon)"/>
    <line x1="18" y1="35" x2="38" y2="20" stroke="#ff0033" stroke-width="2" stroke-linecap="round" filter="url(#neon)"/>
    <!-- Sword -->
    <line x1="38" y1="20" x2="55" y2="-5" stroke="#ff3366" stroke-width="2.5" stroke-linecap="round" filter="url(#neon)"/>
    <!-- Scarf / wind effect -->
    <path d="M-12,15 Q-30,25 -45,15 Q-50,10 -55,20" fill="none" stroke="#ff0033" stroke-width="1.5" stroke-linecap="round" opacity="0.6" filter="url(#neon)"/>
  </g>

  <!-- Tech accents -->
  <g opacity="0.5">
    <rect x="50" y="50" width="6" height="6" fill="#ff0033" rx="1" filter="url(#neon)"/>
    <rect x="584" y="50" width="6" height="6" fill="#ff0033" rx="1" filter="url(#neon)"/>
    <rect x="50" y="304" width="6" height="6" fill="#ff0033" rx="1" filter="url(#neon)"/>
    <rect x="584" y="304" width="6" height="6" fill="#ff0033" rx="1" filter="url(#neon)"/>
  </g>

  <!-- Title text -->
  <text x="320" y="295" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#ff0033" filter="url(#neon)" letter-spacing="8">SAMSY NINJA</text>
  <text x="320" y="318" text-anchor="middle" font-family="monospace" font-size="12" fill="#666688" letter-spacing="4">3D INTERACTIVE EXPERIENCE</text>

  <!-- WebGL/GPU badge -->
  <rect x="268" y="328" width="104" height="18" rx="9" fill="none" stroke="#ff0033" stroke-width="0.8" opacity="0.4"/>
  <text x="320" y="341" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff0033" opacity="0.5" letter-spacing="2">WEBGPU · THREE.JS</text>
</svg>
