<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" />
  
  <!-- Lock icon -->
  <text x="200" y="100" font-size="60" text-anchor="middle">🔐</text>
  
  <!-- Title -->
  <text x="200" y="160" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">The Password Game</text>
  
  <!-- Password dots -->
  <circle cx="120" cy="220" r="15" fill="rgba(255,255,255,0.8)" />
  <circle cx="170" cy="220" r="15" fill="rgba(255,255,255,0.8)" />
  <circle cx="220" cy="220" r="15" fill="rgba(255,255,255,0.8)" />
  <circle cx="270" cy="220" r="15" fill="rgba(255,255,255,0.8)" />
  <circle cx="320" cy="220" r="15" fill="rgba(255,255,255,0.8)" />
  
  <!-- Checkmark -->
  <text x="200" y="280" font-size="40" text-anchor="middle">✅</text>
</svg>
