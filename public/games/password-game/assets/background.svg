<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0a1e"/><stop offset="100%" stop-color="#16163a"/></linearGradient>
    <filter id="textGlow"><feGaussianBlur stdDeviation="1.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Matrix-style rain effect (static) -->
  <g font-family="monospace" font-size="11" fill="#0f0" opacity="0.07">
    <text x="50" y="40">01000101</text><text x="150" y="80">11010010</text><text x="300" y="30">00110101</text>
    <text x="450" y="90">10101010</text><text x="600" y="50">01110011</text><text x="700" y="120">10010011</text>
    <text x="80" y="380">11001010</text><text x="250" y="420">00101110</text><text x="500" y="390">10110100</text>
    <text x="650" y="430">01101001</text><text x="100" y="200">10000111</text><text x="700" y="250">01010101</text>
  </g>
  <!-- Password input field (centered, prominent) -->
  <g transform="translate(170,130)">
    <rect x="0" y="0" width="460" height="64" rx="14" fill="#12122e" stroke="#3b3b6e" stroke-width="2.5"/>
    <!-- Text cursor blink representation -->
    <rect x="20" y="20" width="2" height="28" fill="#00ff00" opacity="0.85"/>
    <text x="34" y="44" font-family="monospace" font-size="20" fill="#c0c0e0" filter="url(#textGlow)">P@ssw0rd_Rul3s!🔐</text>
  </g>
  <!-- Rules panel -->
  <g transform="translate(170,215)">
    <rect x="0" y="0" width="460" height="165" rx="12" fill="#0e0e28" stroke="#2a2a55" stroke-width="1.5"/>
    <g font-family="monospace" font-size="14" fill="#a0a0d0">
      <text x="20" y="30">✅ Rule 1:  8+ characters</text>
      <text x="20" y="55">✅ Rule 2:  Include uppercase letter</text>
      <text x="20" y="80">✅ Rule 3:  Include a number</text>
      <text x="20" y="105">✅ Rule 4:  Include special character</text>
      <text x="20" y="130"⬜ Rule 5:  Digits must add to 25</text>
      <text x="20" y="155">⬜ Rule 6:  Contain a Roman numeral</text>
    </g>
  </g>
  <!-- Lock icon (top center) -->
  <g transform="translate(355,80)" opacity="0.35">
    <rect x="6" y="18" width="38" height="30" rx="5" fill="none" stroke="#ffd700" stroke-width="3.5"/>
    <path d="M12 18 v-8 a13 13 0 0 1 26 0 v8" fill="none" stroke="#ffd700" stroke-width="3.5"/>
    <circle cx="25" cy="33" r="3.5" fill="#ffd700"/>
    <circle cx="25" cy="33" r="1.5" fill="#0a0a1e"/>
  </g>
  <!-- Strength meter -->
  <g transform="translate(170,395)">
    <rect x="0" y="0" width="460" height="8" rx="4" fill="#1a1a3e"/>
    <rect x="0" y="0" width="310" height="8" rx="4" fill="url(#strGrad)"/>
    <text x="475" y="9" font-family="sans-serif" font-size="11" fill="#22c55e">STRONG</text>
  </g>
  <defs><linearGradient id="strGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient></defs>
  <text x="400" y="435" text-anchor="middle" font-family="monospace" font-size="13" fill="#ff6b6b" opacity="0.2" letter-spacing="3">THE PASSWORD GAME</text>
</svg>