<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#1a0a2e"/></linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00ffff" stop-opacity="0.9"/><stop offset="100%" stop-color="#ff00ff" stop-opacity="0.3"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Neon track lines (perspective) -->
  <g filter="url(#glow)">
    <line x1="160" y1="0" x2="20" y2="450" stroke="url(#track)" stroke-width="4" opacity="0.7"/>
    <line x1="370" y1="0" x2="230" y2="450" stroke="url(#track)" stroke-width="4" opacity="0.7"/>
    <line x1="580" y1="0" x2="440" y2="450" stroke="url(#track)" stroke-width="4" opacity="0.7"/>
    <line x1="720" y1="0" x2="600" y2="450" stroke="url(#track)" stroke-width="3" opacity="0.4"/>
    <!-- Horizontal speed lines -->
    <line x1="0" y1="230" x2="800" y2="230" stroke="#00ffff" stroke-width="0.5" opacity="0.15"/>
    <line x1="0" y1="235" x2="800" y2="235" stroke="#ff00ff" stroke-width="0.5" opacity="0.1"/>
  </g>
  <!-- Ball (main focus) -->
  <g filter="url(#glow)">
    <circle cx="300" cy="215" r="22" fill="#ffffff"/>
    <circle cx="294" y="209" r="8" fill="#e8e8e8" opacity="0.7"/>
    <!-- Speed trail -->
    <circle cx="270" cy="232" r="12" fill="white" opacity="0.2"/>
    <circle cx="245" cy="248" r="8" fill="white" opacity="0.1"/>
  </g>
  <!-- Red obstacles (cubes) -->
  <g filter="url(#glow)">
    <rect x="380" y="270" width="34" height="34" rx="4" fill="#ff0044" opacity="0.8"/>
    <rect x="520" y="340" width="28" height="28" rx="3" fill="#ff0044" opacity="0.6"/>
    <rect x="210" y="160" width="24" height="24" rx="3" fill="#ff0044" opacity="0.5"/>
    <rect x="620" y="290" width="26" height="26" rx="3" fill="#ff0044" opacity="0.4"/>
  </g>
  <!-- Speed particles -->
  <g fill="#00ffff" opacity="0.6">
    <circle cx="325" cy="230" r="2.5"/><circle cx="340" cy="242" r="2"/><circle cx="352" cy="250" r="1.5"/>
    <circle cx="315" cy="225" r="1.5" opacity="0.4"/><circle cx="335" cy="238" r="1" opacity="0.3"/>
  </g>
  <!-- Ambient glow -->
  <circle cx="300" cy="215" r="80" fill="#00ffff" opacity="0.04" filter="url(#glow)"/>
  <text x="400" y="432" text-anchor="middle" font-family="Orbitron,monospace" font-size="14" fill="#00ffff" opacity="0.25" letter-spacing="12">SLOPE</text>
</svg>