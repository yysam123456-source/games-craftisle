<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="neon-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0533;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:#ff0066;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff0066;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#neon-bg)" rx="16"/>
  <!-- Neon glow line (the slope) -->
  <line x1="-20" y1="220" x2="420" y2="120" stroke="#ff0066" stroke-width="4" filter="blur(3px)"/>
  <line x1="-20" y1="220" x2="420" y2="120" stroke="#ff0066" stroke-width="2"/>
  <!-- Ball -->
  <circle cx="200" cy="168" r="16" fill="#00ffff"/>
  <circle cx="200" cy="168" r="16" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <!-- Ball glow effect -->
  <circle cx="200" cy="168" r="24" fill="url(#glow)"/>
  <!-- Obstacles / red blocks on track -->
  <rect x="100" y="186" width="30" height="20" rx="3" fill="#ff0066" opacity="0.9"/>
  <rect x="260" y="158" width="25" height="18" rx="3" fill="#ff0066" opacity="0.9"/>
  <rect x="330" y="142" width="28" height="22" rx="3" fill="#ff0066" opacity="0.9"/>
  <rect x="50" y="202" width="20" height="16" rx="3" fill="#ff0066" opacity="0.7"/>
  <!-- Speed particles -->
  <line x1="215" y1="163" x2="240" y2="158" stroke="#00ffff" stroke-width="2" opacity="0.5"/>
  <line x1="218" y1="173" x2="238" y2="178" stroke="#00ffff" stroke-width="2" opacity="0.4"/>
  <line x1="212" y1="153" x2="232" y2="146" stroke="#00ffff" stroke-width="1.5" opacity="0.4"/>
  <!-- Speed number -->
  <text x="350" y="45" font-family="'Courier New',monospace" font-size="22" font-weight="bold" fill="#00ffff">SPEED: 47</text>
  <text x="50" y="45" font-family="'Courier New',monospace" font-size="20" fill="#ff0066">⚡ SCORE: 1280</text>
  <!-- Title -->
  <text x="200" y="278" font-family="'Courier New',monospace" font-size="30" font-weight="bold" text-anchor="middle" fill="#00ffff">SLOPE</text>
</svg>
