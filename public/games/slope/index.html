<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Slope</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif}
#game{position:relative;width:800px;height:600px}
canvas{display:block;border-radius:12px;box-shadow:0 0 60px rgba(100,120,230,.2)}
#hud{position:absolute;top:15px;left:0;width:100%;display:flex;justify-content:center;gap:40px;color:#4a5a7a;font-size:13px;font-weight:700;pointer-events:none;letter-spacing:.5px;z-index:2}
#hud b{color:#7088ff}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,20,.9);border-radius:12px;z-index:3;transition:opacity .4s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{color:#7088ff;font-size:52px;font-weight:900;letter-spacing:6px;margin-bottom:5px;text-shadow:0 0 50px rgba(100,120,230,.6)}
#overlay .sub{color:#5a6a8a;font-size:14px;margin-bottom:25px}
#overlay .controls{color:#3a4a6a;font-size:12px;margin-bottom:20px;line-height:2;text-align:center}
#overlay button{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:14px 48px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;letter-spacing:1px}
#overlay button:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(100,120,230,.5)}
#overlay .gameover{color:#ff4444;font-size:38px;font-weight:900;margin-bottom:5px}
#overlay .final-score{color:#aabbdd;font-size:16px;margin-bottom:18px}
</style>
</head>
<body>
<div id="game">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="hud">
    <span>Score: <b id="score-el">0</b></span>
    <span>Best: <b id="best-el">0</b></span>
    <span>Speed: <b id="speed-el">1.0x</b></span>
  </div>
  <div id="overlay">
    <h1>SLOPE</h1>
    <div class="sub">Race down the endless slope</div>
    <div class="controls">← → or A / D to steer &nbsp;|&nbsp; Avoid red obstacles</div>
    <button id="start-btn">START</button>
  </div>
</div>

<script>
"use strict";
// ============================================================
//  Slope — fully refactored
//  Proper pseudo-3D perspective, clean game logic
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// ---- State ----
let state = 'idle';      // idle | playing | dead
let score = 0;
let best = +(localStorage.getItem('slope-best') || 0);
let speed = 0;
let maxSpeed = 0;
let ballX = 0;          // -1..1  lateral position on track
let ballVX = 0;         // velocity X
let trackZ = 0;         // how far the player has travelled
let shakeTimer = 0;

// ---- Track definition ----
// Track is an array of segments.
// Each segment: { curve }  curve = how much the track turns (-1..1)
// The track is generated procedurally.
const SEG_LEN = 1;       // world units per segment
const DRAW_DIST = 250;    // how many segments to draw ahead
const SPAWN_DIST = 180;   // how far ahead to spawn obstacles

let segments = [];        // track segments
let obstacles = [];       // {z, lane, width, scored}

// ---- Perspective parameters ----
const FOCAL = 600;        // focal length for perspective
const VANISH_Y = 200;     // vanishing point Y on screen

// ---- Input ----
const keys = { left: false, right: false };
let touchStartX = null;
let touchLastX = null;

// ---- UI ----
const scoreEl = document.getElementById('score-el');
const bestEl = document.getElementById('best-el');
const speedEl = document.getElementById('speed-el');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');

bestEl.textContent = best;

// ============================================================
//  Track generation
// ============================================================
function generateTrack(upto) {
  while (segments.length < upto) {
    const prev = segments[segments.length - 1] || { curve: 0, x: 0 };
    let curve = prev.curve;
    // Smooth random walk for curve
    curve += (Math.random() - 0.5) * 0.04;
    // Clamp curve
    curve = Math.max(-0.35, Math.min(0.35, curve));
    // Occasional sharper turn
    if (Math.random() < 0.04) {
      curve += (Math.random() - 0.5) * 0.25;
      curve = Math.max(-0.35, Math.min(0.35, curve));
    }
    // Compute x position (lateral offset of track center)
    const x = (prev.x || 0) + curve * SEG_LEN;
    segments.push({ curve, x });
  }
}

function getTrackX(z) {
  // Get track center X at position z (interpolated)
  const idx = Math.floor(z / SEG_LEN);
  const frac = (z / SEG_LEN) - idx;
  const i0 = Math.max(0, Math.min(idx, segments.length - 1));
  const i1 = Math.min(i0 + 1, segments.length - 1);
  const s0 = segments[i0];
  const s1 = segments[i1];
  const x0 = s0 ? s0.x : 0;
  const x1 = s1 ? s1.x : x0;
  return x0 + (x1 - x0) * frac;
}

function project(wx, wz) {
  if (wz < 0.5) return null;
  const scale = FOCAL / (FOCAL + wz * 1.5);
  const sx = W / 2 + wx * scale;
  const sy = VANISH_Y + (H - VANISH_Y) * (1 - scale);
  return { sx, sy, scale };
}

// ============================================================
//  Obstacle management
// ============================================================
function spawnObstacle() {
  if (obstacles.length > 15) return;
  const lastZ = obstacles.length > 0 ? Math.max(...obstacles.map(o => o.z)) : trackZ + 500;
  if (lastZ < trackZ + SPAWN_DIST - 40) return;

  const z = trackZ + SPAWN_DIST + Math.random() * 80;
  const lane = (Math.random() - 0.5) * 1.6;  // -0.8 .. 0.8
  const width = 0.2 + Math.random() * 0.3;
  obstacles.push({ z, lane, width, scored: false });
}

function updateObstacles() {
  // Remove passed obstacles, add score
  for (let i = obstacles.length - 1; i >= 0; i--) {
    if (obstacles[i].z < trackZ - 5) {
      if (!obstacles[i].scored) {
        score += 10;
        scoreEl.textContent = score;
        obstacles[i].scored = true;
      }
      obstacles.splice(i, 1);
    }
  }
  // Spawn new ones
  if (Math.random() < 0.018 + speed * 0.0008) {
    spawnObstacle();
  }
}

// ============================================================
//  Collision detection
// ============================================================
function checkCollisions() {
  for (const obs of obstacles) {
    const dz = obs.z - trackZ;
    if (dz > 30 || dz < 0) continue;
    const trackCX = getTrackX(obs.z);
    const obsWorldX = trackCX + obs.lane;
    const ballWorldX = getTrackX(trackZ) + ballX * 2;  // ballX is -1..1, scale to world
    if (Math.abs(ballWorldX - obsWorldX) < obs.width + 0.15) {
      return true;  // collision
    }
  }
  return false;
}

// ============================================================
//  Game logic
// ============================================================
function resetGame() {
  segments = [];
  obstacles = [];
  trackZ = 0;
  ballX = 0;
  ballVX = 0;
  speed = 2.8;
  maxSpeed = 2.8;
  score = 0;
  scoreEl.textContent = '0';
  generateTrack(400);
}

function update() {
  if (state !== 'playing') return;

  // Speed increase
  speed += 0.003;
  if (speed > 12) speed = 12;
  maxSpeed = Math.max(maxSpeed, speed);

  // Move forward
  trackZ += speed * 0.6;

  // Generate more track
  generateTrack(Math.floor(trackZ / SEG_LEN) + DRAW_DIST + 50);

  // Steering
  const STEER = 0.035;
  if (keys.left) ballVX -= STEER;
  if (keys.right) ballVX += STEER;
  ballVX *= 0.89;  // damping
  ballX += ballVX;
  // Clamp ball position
  const lim = 1.1;
  if (ballX < -lim) { ballX = -lim; ballVX = Math.abs(ballVX) * 0.03; }
  if (ballX > lim) { ballX = lim; ballVX = -Math.abs(ballVX) * 0.03; }

  // Track curvature influence
  const curv = segments[Math.floor(trackZ / SEG_LEN)];
  if (curv) ballVX += curv.curve * 0.01;

  // Update obstacles
  updateObstacles();

  // Collision
  if (checkCollisions()) {
    die();
    return;
  }

  // Update HUD
  speedEl.textContent = speed.toFixed(1) + 'x';
}

function die() {
  state = 'dead';
  shakeTimer = 20;
  if (score > best) {
    best = score;
    localStorage.setItem('slope-best', best);
    bestEl.textContent = best;
  }
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <div class="gameover">GAME OVER</div>
    <div class="final-score">Score: ${score}</div>
    <button id="retry-btn">RETRY</button>
  `;
  document.getElementById('retry-btn').onclick = () => {
    resetGame();
    state = 'playing';
    overlay.classList.add('hidden');
  };
}

// ============================================================
//  Rendering
// ============================================================
function draw() {
  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, VANISH_Y + 40);
  skyGrad.addColorStop(0, '#050510');
  skyGrad.addColorStop(1, '#0a0a2a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, VANISH_Y + 40);

  // Ground below vanishing point
  ctx.fillStyle = '#08081e';
  ctx.fillRect(0, VANISH_Y + 40, W, H - VANISH_Y - 40);

  // Draw track segments (far to near)
  const ballTrackX = getTrackX(trackZ);

  // We draw from far to near so nearer segments overdraw farther ones
  const startIdx = Math.floor((trackZ + DRAW_DIST) / SEG_LEN);
  const endIdx = Math.floor(trackZ / SEG_LEN);

  let prevL = null, prevR = null;

  for (let i = startIdx; i >= endIdx; i--) {
    const z0 = i * SEG_LEN;
    const z1 = (i + 1) * SEG_LEN;
    const dz0 = z0 - trackZ;
    const dz1 = z1 - trackZ;
    if (dz0 < 0.5 && dz1 < 0.5) continue;
    if (dz0 > DRAW_DIST || dz1 > DRAW_DIST) continue;

    const cx0 = getTrackX(z0);
    const cx1 = getTrackX(z1);

    // Project track edges (half-width = 2.5 world units)
    const HW = 2.8;
    const pL0 = project(cx0 - HW - ballTrackX, dz0);
    const pR0 = project(cx0 + HW - ballTrackX, dz0);
    const pL1 = project(cx1 - HW - ballTrackX, dz1);
    const pR1 = project(cx1 + HW - ballTrackX, dz1);

    if (!pL0 || !pR0 || !pL1 || !pR1) continue;
    if (pL0.scale < 0.02 || pR0.scale < 0.02) continue;

    // Draw road segment as trapezoid
    const alpha = 0.08 + pL0.scale * 0.5;
    ctx.fillStyle = `rgba(10, 10, 30, ${alpha})`;
    ctx.beginPath();
    ctx.moveTo(pL1.sx, pL1.sy);
    ctx.lineTo(pR1.sx, pR1.sy);
    ctx.lineTo(pR0.sx, pR0.sy);
    ctx.lineTo(pL0.sx, pL0.sy);
    ctx.closePath();
    ctx.fill();

    // Road edge glow
    const glowAlpha = pL0.scale * 0.35;
    ctx.strokeStyle = `rgba(100, 120, 255, ${glowAlpha})`;
    ctx.lineWidth = Math.max(1, pL0.scale * 2.5);
    ctx.beginPath();
    ctx.moveTo(pL1.sx, pL1.sy);
    ctx.lineTo(pL0.sx, pL0.sy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pR1.sx, pR1.sy);
    ctx.lineTo(pR0.sx, pR0.sy);
    ctx.stroke();

    // Center line (dashed)
    if (pL0.scale > 0.06) {
      ctx.strokeStyle = `rgba(100, 120, 255, ${pL0.scale * 0.12})`;
      ctx.lineWidth = 0.5;
      ctx.setLineDash([2, 8]);
      ctx.beginPath();
      ctx.moveTo((pL1.sx + pR1.sx) / 2, (pL1.sy + pR1.sy) / 2);
      ctx.lineTo((pL0.sx + pR0.sx) / 2, (pL0.sy + pR0.sy) / 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    prevL = pL0;
    prevR = pR0;
  }

  // ---- Draw obstacles ----
  for (const obs of obstacles) {
    const dz = obs.z - trackZ;
    if (dz > DRAW_DIST || dz < 0) continue;
    const trackCX = getTrackX(obs.z);
    const obsWX = trackCX + obs.lane - ballTrackX;
    const p = project(obsWX, dz);
    if (!p || p.scale < 0.03) continue;

    const obsW = Math.max(6, p.scale * 50 * (obs.width / 0.3));
    const obsH = Math.max(4, p.scale * 18);
    const ox = p.sx;
    const oy = p.sy;

    ctx.save();
    ctx.translate(ox, oy);
    ctx.shadowBlur = p.scale > 0.08 ? 16 : 4;
    ctx.shadowColor = '#ff3333';
    ctx.fillStyle = '#ee2222';
    ctx.beginPath();
    ctx.roundRect(-obsW / 2, -obsH / 2, obsW, obsH, Math.max(2, p.scale * 6));
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(-obsW / 2 + obsW * 0.05, -obsH / 2 + obsH * 0.07, obsW * 0.9, obsH * 0.18);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ---- Draw ball ----
  // Ball is fixed at bottom center of screen
  const ballScreenX = W / 2 + ballX * 60;
  const ballScreenY = H - 55;
  const ballR = 12;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.ellipse(ballScreenX + 2, ballScreenY + ballR + 6, ballR * 1.3, ballR * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();

  // Glow
  if (state === 'playing') {
    ctx.shadowBlur = 14;
    ctx.shadowColor = '#7088ff';
  }
  // Ball body
  ctx.save();
  ctx.translate(ballScreenX, ballScreenY);
  ctx.rotate(ballVX * -0.2);
  const ballGrad = ctx.createRadialGradient(-3, -3, 0, 0, 0, ballR);
  ballGrad.addColorStop(0, '#ffffff');
  ballGrad.addColorStop(0.3, '#8899ff');
  ballGrad.addColorStop(0.75, '#5566dd');
  ballGrad.addColorStop(1, '#3344aa');
  ctx.fillStyle = ballGrad;
  ctx.beginPath();
  ctx.arc(0, 0, ballR, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(-ballR * 0.2, -ballR * 0.2, ballR * 0.2, ballR * 0.12, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Motion trail
  if (state === 'playing' && Math.abs(ballVX) > 0.01) {
    for (let i = 1; i <= 3; i++) {
      ctx.fillStyle = `rgba(100,120,255,${0.06 / i})`;
      ctx.beginPath();
      ctx.arc(ballScreenX - ballVX * i * 22 * (0.6 - i * 0.1), ballScreenY, ballR * (1 - i * 0.1), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Horizon glow
  const hg = ctx.createRadialGradient(W / 2, VANISH_Y, 0, W / 2, VANISH_Y, 120);
  hg.addColorStop(0, 'rgba(100,120,255,0.06)');
  hg.addColorStop(1, 'transparent');
  ctx.fillStyle = hg;
  ctx.fillRect(0, VANISH_Y - 40, W, 80);
}

// ============================================================
//  Input handling
// ============================================================
function onKeyDown(e) {
  if (['ArrowLeft', 'a', 'A'].includes(e.key)) {
    keys.left = true;
    e.preventDefault();
    if (state === 'idle') startGame();
  }
  if (['ArrowRight', 'd', 'D'].includes(e.key)) {
    keys.right = true;
    e.preventDefault();
    if (state === 'idle') startGame();
  }
  if ([' ', 'Enter'].includes(e.key)) {
    e.preventDefault();
    if (state !== 'playing' && state !== 'dead') startGame();
  }
}
function onKeyUp(e) {
  if (['ArrowLeft', 'a', 'A'].includes(e.key)) keys.left = false;
  if (['ArrowRight', 'd', 'D'].includes(e.key)) keys.right = false;
}

function onTouchStart(e) {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchLastX = touchStartX;
  if (state === 'idle') startGame();
}
function onTouchMove(e) {
  e.preventDefault();
  if (!touchLastX) return;
  const dx = e.touches[0].clientX - touchLastX;
  ballVX += dx * 0.003;
  touchLastX = e.touches[0].clientX;
}
function onTouchEnd(e) {
  touchStartX = null;
  touchLastX = null;
}

function startGame() {
  resetGame();
  state = 'playing';
  overlay.classList.add('hidden');
}

// ---- Event listeners ----
document.addEventListener('keydown', onKeyDown);
document.addEventListener('keyup', onKeyUp);
canvas.addEventListener('touchstart', onTouchStart, { passive: false });
canvas.addEventListener('touchmove', onTouchMove, { passive: false });
canvas.addEventListener('touchend', onTouchEnd);
startBtn.onclick = startGame;

// ============================================================
//  Game loop
// ============================================================
function gameLoop() {
  requestAnimationFrame(gameLoop);
  update();

  ctx.clearRect(0, 0, W, H);
  if (shakeTimer > 0) {
    shakeTimer--;
    ctx.save();
    ctx.translate((Math.random() - 0.5) * shakeTimer * 2, (Math.random() - 0.5) * shakeTimer * 1.5);
  }
  draw();
  if (shakeTimer > 0) ctx.restore();
}

// ---- Resize handler (for iframe embedding) ----
function reportHeight() {
  const h = document.body.scrollHeight;
  if (h > 100 && window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'game-resize', height: h + 20 }, '*');
  }
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => { setTimeout(reportHeight, 100); setTimeout(reportHeight, 500); });
} else {
  setTimeout(reportHeight, 100); setTimeout(reportHeight, 500);
}
window.addEventListener('resize', reportHeight);
if (typeof MutationObserver !== 'undefined') {
  new MutationObserver(() => { clearTimeout(reportHeight._t); reportHeight._t = setTimeout(reportHeight, 200); })
    .observe(document.body, { childList: true, subtree: true, attributes: true });
}

// ---- Start ----
gameLoop();
</script>

<script>
(function(){function h(){var d=Math.max(document.body?.scrollHeight||0,document.documentElement?.scrollHeight||0,document.body?.offsetHeight||0,document.documentElement?.offsetHeight||0,document.body?.clientHeight||0);if(d>100&&window.parent&&window.parent!==window)window.parent.postMessage({type:'game-resize',height:d+20},'*');}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){setTimeout(h,100);setTimeout(h,500);setTimeout(h,1000)});else{setTimeout(h,100);setTimeout(h,500);setTimeout(h,1000);}window.addEventListener('resize',h);if(typeof MutationObserver!=='undefined'){var o=new MutationObserver(function(){clearTimeout(o._timer);o._timer=setTimeout(h,200)});o.observe(document.body||document.documentElement,{childList:true,subtree:true,attributes:true})}})();
</script>
</body>
</html>
