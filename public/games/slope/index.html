<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Slope</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif}
#game{position:relative;width:800px;height:600px}
canvas{display:block;border-radius:12px}
#hud{position:absolute;top:12px;left:0;width:100%;display:flex;justify-content:center;gap:36px;color:#5a6a8a;font-size:13px;font-weight:700;pointer-events:none;z-index:2}
#hud b{color:#7894ff}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,3,15,.93);border-radius:12px;z-index:3;transition:opacity .35s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{color:#7894ff;font-size:50px;font-weight:900;letter-spacing:7px;margin-bottom:4px;text-shadow:0 0 50px rgba(100,120,255,.55)}
#overlay .sub{color:#5a6a8a;font-size:14px;margin-bottom:22px}
#overlay .ctrl{color:#3a4a66;font-size:11.5px;margin-bottom:18px;line-height:2;text-align:center}
#overlay button{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:13px 46px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:transform .14s,box-shadow .14s}
#overlay button:hover{transform:scale(1.05);box-shadow:0 0 28px rgba(102,126,234,.48)}
#overlay .go{color:#ff4444;font-size:36px;font-weight:900;margin-bottom:2px}
#overlay .fscore{color:#bbccff;font-size:16px;margin-bottom:16px}
</style>
</head>
<body>
<div id="game">
<canvas id="c" width="800" height="600"></canvas>
<div id="hud"><span>Score:<b id="sc">0</b></span><span>Best:<b id="bs">0</b></span><span>Speed:<b id="sp">1.0x</b></span></div>
<div id="overlay">
<h1>SLOPE</h1><div class="sub">Race down the endless slope</div>
<div class="ctrl">&larr; &rarr; or A/D to steer &nbsp;|&nbsp; Avoid red blocks</div>
<button id="btn">START</button>
</div>
</div>

<script>
"use strict";
// ================================================================
//  Slope — Pseudo-3D endless runner
//  Classic OutRun-style projection
// ================================================================

const C=document.getElementById('c'),X=C.getContext('2d');
const W=800,H=600;

// ---- Camera & perspective (tuned for good visual proportions) ----
const CAM_H=1200;          // camera height above ground (world units)
const HORIZON_Y=160;       // horizon line Y position on screen
const ROAD_W=1800;         // road half-width at base (world units)

function proj(wx,wz){
  // wx: lateral offset from center (world units), wz: distance ahead (>0)
  if(wz<=0)return null;
  const s=CAM_H/(CAM_H+wz);
  return{
    sx:W/2+wx*s*ROAD_W/CAM_H,
    sy:HORIZON_Y+(H-HORIZON_Y)*s,
    s:s
  };
}

// ---- Game state ----
let st='idle';             // idle|playing|dead
let score=0,best=+localStorage.getItem('slope-best')||0;
let spd=0;
let bx=0,bvx=0;            // ball lane (-1..1), velocity
let posZ=0;                // player Z position (world units)
let shake=0;

// ---- Track data ----
// Each segment stores curve value (-1..1)
const SEGLEN=200;           // world units per segment segment
const segs=[];              // {curve, x} array
const obs=[];               // obstacles: {z, lane(-1..1), w}

// ---- UI refs ----
const scEl=document.getElementById('sc');
const bsEl=document.getElementById('bs');
const spEl=document.getElementById('sp');
const ov=document.getElementById('overlay');
bsEl.textContent=best;

// ---- Input ----
const K={L:false,R:false};

// ================================================================
//  Track generation
// ================================================================
function genSegs(need){
  while(segs.length<need){
    const prev=segs[segs.length-1]||{curve:0,x:0};
    let c=prev.curve+(Math.random()-.5)*.06;
    c=Math.max(-.6,Math.min(.6,c));
    if(Math.random()<.03)c+=(Math.random()-.5)*.45;
    c=Math.max(-.6,Math.min(.6,c));
    segs.push({curve:c,x:prev.x+c*SEGLEN});
  }
}
function trkX(z){
  const i=Math.floor(z/SEGLEN),f=(z/SEGLEN)-i;
  const s0=segs[Math.max(0,Math.min(i,segs.length-1))]||{};
  const s1=segs[Math.max(0,Math.min(i+1,segs.length-1))]||s0;
  return(s0.x||0)+((s1.x||0)-(s0.x||0))*f;
}

// ================================================================
//  Obstacles
// ================================================================
function spawnObs(){
  if(obs.length>12)return;
  const lz=obs.length?Math.max(...obs.map(o=>o.z)):posZ+5000;
  if(lz<posZ+3500)return;
  obs.push({
    z:posZ+3500+Math.random()*1500,
    lane:(Math.random()-.5)*1.65,
    w:.22+Math.random()*.32
  });
}
function updObs(){
  for(let i=obs.length-1;i>=0;i--){
    if(obs[i].z<posZ-200){score+=10;scEl.textContent=score;obs.splice(i,1);}
  }
  if(Math.random()<.015+.001*spd)spawnObs();
}

// ================================================================
//  Collision
// ================================================================
function hit(){
  for(const o of obs){
    const dz=o.z-posZ;
    if(dz>900||dz<0)continue;
    const ox=trkX(o.z)+o.lane*ROAD_W*.42;
    const px=trkX(posZ)+bx*ROAD_W*.42;
    if(Math.abs(px-ox)<(o.w+.18)*ROAD_W*.38&&dz<700)return true;
  }
  return false;
}

// ================================================================
//  Reset / Update
// ================================================================
function reset(){
  segs.length=0;obs.length=0;
  posZ=0;bx=0;bvx=0;spd=280;score=0;
  scEl.textContent='0';
  genSegs(30);
}

function update(){
  if(st!=='playing')return;
  spd+=.35;if(spd>1100)spd=1100;
  posZ+=spd*.042;
  genSegs(Math.floor(posZ/SEGLEN)+25);

  // Steering
  const ACC=2.2;
  if(K.L)bvx-=ACC;if(R)bvx+=ACC;
  bvx*=.88;bx+=bvx;
  if(bx<-1.08){bx=-1.08;bvx*=.04;}
  if(bx>1.08){bx=1.08;bvx=-Math.abs(bvx)*.04;}

  // Curve push
  const ci=Math.floor(posZ/SEGLEN);
  if(segs[ci])bvx+=segs[ci].curve*.004;

  updObs();
  if(hit()){die();return;}
  spEl.textContent=(spd/280).toFixed(1)+'x';
}

function die(){
  st='dead';shake=22;
  if(score>best){best=score;localStorage.setItem('slope-best',best);bsEl.textContent=best;}
  ov.classList.remove('hidden');
  ov.innerHTML=`<div class="go">GAME OVER</div><div class="fscore">Score: ${score}</div><button id="btn2">RETRY</button>`;
  document.getElementById('btn2').onclick=()=>{reset();st='playing';ov.classList.add('hidden');};
}

// ================================================================
//  Render
// ================================================================
function draw(){
  // Sky
  const sg=X.createLinearGradient(0,0,0,HORIZON_Y+30);
  sg.addColorStop(0,'#04040e');sg.addColorStop(1,'#0c0c28');
  X.fillStyle=sg;X.fillRect(0,0,W,HORIZON_Y+30);

  // Ground fill
  X.fillStyle='#07071a';
  X.fillRect(0,HORIZON_Y+30,W,H-HORIZON-Y-30);

  // Horizon glow
  const hg=X.createRadialGradient(W/2,HORIZON_Y,0,W/2,HORIZON_Y,160);
  hg.addColorStop(0,'rgba(90,110,210,.07)');hg.addColorStop(1,'transparent');
  X.fillStyle=hg;X.fillRect(0,HORIZON_Y-40,W,80);

  // ---- Draw road segments far->near ----
  const baseX=trkX(posZ);
  const DRAW=12000;        // draw distance ahead
  const STEP=300;          // step size between drawn strips
  let pL=null,pR=null;

  for(let z=posZ+DRAW;z>=posZ;z-=STEP){
    const cx=trkX(z);
    const dx=cx-baseX;
    const pl=proj(dx-ROAD_W,z-posZ);
    const pr=proj(dx+ROAD_W,z-posZ);
    if(!pl||!pr)continue;
    if(pl.s<.008)continue;

    // Road surface
    const a=.06+pl.s*.52;
    X.fillStyle=`rgba(8,10,26,${a})`;
    X.beginPath();
    if(pL){
      X.moveTo(pL.sx,pL.sy);X.lineTo(pR.sx,pR.sy);
      X.lineTo(pr.sx,pr.sy);X.lineTo(pl.sx,pl.sy);
      X.closePath();X.fill();
    }

    // Edge lines (neon blue)
    const ea=pl.s*.38;
    X.strokeStyle=`rgba(100,130,255,${ea})`;
    X.lineWidth=Math.max(1,pl.s*2.8);
    X.beginPath();if(pL){X.moveTo(pL.sx,pL.sy);}X.lineTo(pl.sx,pl.sy);X.stroke();
    X.beginPath();if(pR){X.moveTo(pR.sx,pR.sy);}X.lineTo(pr.sx,pr.sy);X.stroke();

    // Center dashed line
    if(pl.s>.065){
      X.strokeStyle=`rgba(100,130,255,${pl.s*.115})`;
      X.lineWidth=.6;X.setLineDash([3,10]);
      X.beginPath();
      const mx=(pl.sx+pr.sx)/2,my=(pl.sy+pr.sy)/2;
      if(pL){const pmx=(pL.sx+pR.sx)/2,pmy=(pL.sy+pR.sy)/2;X.moveTo(pmx,pmy);}
      X.lineTo(mx,my);X.stroke();
      X.setLineDash([]);
    }

    pL=pl;pR=pr;
  }

  // ---- Draw obstacles ----
  for(const o of obs){
    const dz=o.z-posZ;
    if(dz>DRAW||dz<0)continue;
    const cx=trkX(o.z);
    const odx=cx-baseX+o.lane*ROAD_W*.42;
    const p=proj(odx,dz);
    if(!p||p.s<.012)continue;

    const ow=Math.max(8,p.s*62*(o.w/.27));
    const oh=Math.max(5,p.s*22);
    const oy=p.sy-oh*.35;  // sit slightly above road surface

    X.save();X.translate(p.sx,oy);
    X.shadowBlur=p.s>.1?18:5;
    X.shadowColor='#ff2222';
    X.fillStyle='#dd1111';
    X.beginPath();X.roundRect(-ow/2,-oh/2,ow,oh,Math.max(2,p.s*7));X.fill();
    X.fillStyle='rgba(255,255,255,.11)';
    X.fillRect(-ow/2+ow*.05,-oh/2+oh*.07,ow*.9,oh*.17);
    X.shadowBlur=0;X.restore();
  }

  // ---- Ball (fixed at bottom-center area) ----
  const ballSX=W/2+bx*72;
  const ballSY=H-58;
  const br=13;

  // Shadow on "ground"
  X.fillStyle='rgba(0,0,0,.42)';
  X.beginPath();X.ellipse(ballSX+2,ballSY+br+7,br*1.35,br*.21,0,0,Math.PI*2);X.fill();

  // Ball glow
  if(st==='playing'){X.shadowBlur=15;X.shadowColor='#6890ff';}
  X.save();X.translate(ballSX,ballSY);X.rotate(bvx*-.18);
  const bg=X.createRadialGradient(-3,-3,0,0,0,br);
  bg.addColorStop(0,'#fff');bg.addColorStop(0.3,'#89a0ff');
  bg.addColorStop(0.73,'#5670dd');bg.addColorStop(1,'#3450aa');
  X.fillStyle=bg;
  X.beginPath();X.arc(0,0,br,0,Math.PI*2);X.fill();
  X.shadowBlur=0;
  // Shine
  X.fillStyle='rgba(255,255,255,.34)';
  X.beginPath();X.ellipse(-br*.2,-br*.2,br*.2,br*.12,-.3,0,Math.PI*2);X.fill();
  X.restore();

  // Trail
  if(st==='playing'&&Math.abs(bvx)>.01){
    for(let i=1;i<=3;i++){
      X.fillStyle=`rgba(100,130,255,${.055/i})`;
      X.beginPath();X.arc(ballSX-bvx*i*24*(.58-i*.09),ballSY,br*(1-i*.09),0,Math.PI*2);X.fill();
    }
  }
}

// ================================================================
//  Input
// ================================================================
document.addEventListener('keydown',e=>{
  if(['ArrowLeft','a','A'].includes(e.key)){K.L=true;e.preventDefault();if(st==='idle'){reset();st='playing';ov.classList.add('hidden');}}
  if(['ArrowRight','d','D'].includes(e.key)){K.R=true;e.preventDefault();if(st==='idle'){reset();st='playing';ov.classList.add('hidden');}}
  if([' ','Enter'].includes(e.key)){e.preventDefault();if(st!=='playing'&&st!=='dead'){reset();st='playing';ov.classList.add('hidden');}}
});
document.addEventListener('keyup',e=>{
  if(['ArrowLeft','a','A'].includes(e.key))K.L=false;
  if(['ArrowRight','d','D'].includes(e.key))K.R=false;
});
document.getElementById('btn').onclick=()=>{reset();st='playing';ov.classList.add('hidden');};
// Touch: single tap to start, drag to steer
let _tx=null;
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  _tx=e.touches[0].clientX;
  if(st==='idle'||st==='dead'){reset();st='playing';ov.classList.add('hidden');}
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(_tx===null)return;
  const d=e.touches[0].clientX-_tx;
  bvx+=d*.0028;
  _tx=e.touches[0].clientX;
},{passive:false});

// ================================================================
//  Loop
// ================================================================
(function loop(){
  requestAnimationFrame(loop);
  update();
  X.clearRect(0,0,W,H);
  if(shake>0){shake--;X.save();X.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*1.4);}
  draw();
  if(shake>0)X.restore();
})();

// ---- Iframe resize bridge ----
(function(){function h(){var d=Math.max(document.body?.scrollHeight||0,document.documentElement?.scrollHeight||0,document.body?.offsetHeight||0,document.documentElement?.offsetHeight||0,document.body?.clientHeight||0);if(d>100&&window.parent&&window.parent!==window)window.parent.postMessage({type:'game-resize',height:d+20},'*');}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){setTimeout(h,100);setTimeout(h,500)});else{setTimeout(h,100);setTimeout(h,500);}window.addEventListener('resize',h);if(typeof MutationObserver!=='undefined'){var o=new MutationObserver(function(){clearTimeout(o._timer);o._timer=setTimeout(h,200)});o.observe(document.body||document.documentElement,{childList:true,subtree:true,attributes:true})}})();
</script>
</body>
</html>
