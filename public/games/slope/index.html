<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Slope</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030308;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif}
#ui{position:relative}
canvas{display:block;border-radius:10px;box-shadow:0 0 90px rgba(102,126,234,.13)}
#hud{position:absolute;top:11px;width:100%;display:flex;justify-content:center;gap:34px;color:#5a6a88;font-size:12px;font-weight:700;pointer-events:none;letter-spacing:.3px}
#hud b{color:#667eea}
#mask{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,3,8,.92);border-radius:10px;transition:opacity .3s}
#mask.hide{opacity:0;pointer-events:none}
#mask h1{color:#667eea;font-size:44px;font-weight:900;letter-spacing:4px;margin-bottom:3px;text-shadow:0 0 40px rgba(102,126,234,.5)}
#mask .sub{color:#6a7aae;font-size:14px;margin-bottom:20px}
#mask .ctrl{color:#3a4a66;font-size:12px;margin-bottom:18px;line-height:2;text-align:center}
#mask button{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:12px 42px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:transform .12s,box-shadow .12s}
#mask button:hover{transform:scale(1.06);box-shadow:0 0 25px rgba(102,126,234,.5)}
#mask .go{color:#ff4444;font-size:34px;font-weight:900;margin-bottom:1px}
#mask .go-score{color:#ffcdd2;font-size:16px;margin-bottom:16px}
</style>
</head>
<body>
<div id="ui">
  <canvas id="c" width="640" height="480"></canvas>
  <div id="hud"><span>Score: <b id="sc">0</b></span><span>Best: <b id="bs">0</b></span><span>Speed: <b id="sp">1.0x</b></span></div>
  <div id="mask">
    <h1>SLOPE</h1>
    <div class="sub">Race down the infinite slope</div>
    <div class="ctrl">← → &nbsp;or&nbsp; A / D &nbsp;to steer &nbsp;|&nbsp; Avoid red blocks</div>
    <button id="btn">START</button>
  </div>
</div>

<script>
"use strict";
const C=document.getElementById('c'),X=C.getContext('2d');
const W=640,H=480;
const VY=H*0.285;       // vanishing point Y
const SEG_LEN=7;        // world units per segment
const ROAD_HW=220;       // road half-width in world units

const diff=new URLSearchParams(location.search).get('difficulty')||'medium';
const SPDMUL={easy:.6,medium:1,hard:1.45}[diff]||1;

let state='idle',score=0,best=+localStorage.getItem('slope-best')||0;
let spd,ballZ,ballLane,ballVX,trackPts,obs,frame,shake;

const mask=document.getElementById('mask'),btn=document.getElementById('btn');
const scE=document.getElementById('sc'),bsE=document.getElementById('bs'),spE=document.getElementById('sp');
bsE.textContent=best;

// === Track: array of {cx} = center X offset (world units), generated procedurally ===
// ballZ: float, position along track in world units
// trackPts[i] = cx at world position i*SEG_LEN
// Extend trackPts dynamically as ballZ increases
function ensureTrack(upto){
  while(trackPts.length*SEG_LEN<upto+200){
    const prev=trackPts[trackPts.length-1];
    // Curve: gradual random walk, occasional bigger turn
    let nx=prev+(Math.random()-.5)*10;
    nx=Math.max(-400,Math.min(400,nx));
    if(Math.random()<0.06)nx+=(Math.random()-.5)*60;
    trackPts.push(nx);
  }
}
function resetTrack(){
  trackPts=[0];
  ensureTrack(1200);
}
function cxAt(z){
  // Get track center X at world position z (interpolated)
  const idx=Math.floor(z/SEG_LEN);
  const frac=(z/SEG_LEN)-idx;
  const i0=Math.min(Math.max(idx,0),trackPts.length-1);
  const i1=Math.min(i0+1,trackPts.length-1);
  return trackPts[i0]+(trackPts[i1]-trackPts[i0])*frac;
}

function reset(){
  resetTrack();obs=[];
  ballZ=50;ballLane=0;ballVX=0;
  spd=3.2*SPDMUL;
  score=0;shake=0;frame=0;
  scE.textContent='0';spE.textContent=spd.toFixed(1)+'x';
}

// === Perspective: dx from ball, wz distance ahead -> screen ===
function proj(dx,wz){
  if(wz<0.5)return null;
  const f=280/(280+wz*0.3);
  return{sx:W/2+dx*f, sy:VY+(H-VY)*(1-f*0.76), sc:f};
}

// === Obstacles: {z, lane(-1..1), w(0.15..0.45)} ===
function trySpawn(){
  if(obs.length>10)return;
  const lastZ=obs.length?Math.max(...obs.map(o=>o.z)):ballZ+2000;
  if(lastZ<ballZ+800)return;
  const z=ballZ+800+Math.random()*400;
  const lane=(Math.random()-.5)*1.5;
  const w=0.18+Math.random()*0.28;
  obs.push({z:z,lane:lane,w:w});
}

// === Update ===
function update(){
  if(state!=='playing')return;
  frame++;

  // Speed up
  spd+=0.004*SPDMUL;
  if(spd>14*SPDMUL)spd=14*SPDMUL;

  // Ball forward
  ballZ+=spd*0.5;

  // Ensure track ahead
  ensureTrack(ballZ+1200);

  // Move/remove obstacles
  for(let i=obs.length-1;i>=0;i--){
    if(obs[i].z<ballZ-5){
      obs.splice(i,1);score+=10;scE.textContent=score;
    }
  }

  // Spawn
  if(Math.random()<0.02+spd*0.0006)trySpawn();

  // Steering — responsive!
  const ACC=0.038;
  if(K.left)ballVX-=ACC;
  if(K.right)ballVX+=ACC;
  ballVX*=0.91; // damping (was 0.87 — too high)
  ballLane+=ballVX;
  // Lane limit
  const LIM=1.12;
  if(ballLane<-LIM){ballLane=-LIM;ballVX=Math.abs(ballVX)*0.05;}
  if(ballLane>LIM){ballLane=LIM;ballVX=-Math.abs(ballVX)*0.05;}

  // Track curvature pushes ball gently
  const curve=(cxAt(ballZ+20)-cxAt(ballZ))/20;
  ballVX+=curve*0.012;

  // Collision
  for(let i=0;i<obs.length;i++){
    const o=obs[i];
    const dz=o.z-ballZ;
    if(dz>35||dz<0)continue;
    if(Math.abs(ballLane-o.lane)<o.w+0.12){
      die();return;
    }
  }

  spE.textContent=spd.toFixed(1)+'x';
}

// === Draw ===
function draw(){
  // Sky gradient
  const sg=X.createLinearGradient(0,0,0,VY+20);
  sg.addColorStop(0,'#020206');sg.addColorStop(1,'#08081e');
  X.fillStyle=sg;X.fillRect(0,0,W,VY+20);
  X.fillStyle='#050510';X.fillRect(0,VY+20,W,H-VY-20);

  // Ball world X (for camera)
  const ballWX=cxAt(ballZ)+ballLane*ROAD_HW;

  // Draw track segments: far to near
  const STEP=14;
  let prev=null;
  for(let z=ballZ+1100;z>ballZ;z-=STEP){
    const cx=cxAt(z);
    const wz=z-ballZ;
    const dx=cx-ballWX; // offset from ball world X
    const p=proj(dx,wz);
    if(!p||p.sc<0.03)continue;

    const hw=ROAD_HW*p.sc; // road half-width in screen px

    if(prev&&p.sc>0.03){
      // Road surface
      X.fillStyle=`rgba(8,8,20,${0.1+p.sc*0.55})`;
      X.beginPath();
      X.moveTo(prev.sx-prev.hw,prev.sy);
      X.lineTo(prev.sx+prev.hw,prev.sy);
      X.lineTo(p.sx+hw,p.sy);
      X.lineTo(p.sx-hw,p.sy);
      X.closePath();X.fill();

      // Grid lines (perspective)
      if(Math.floor(z/35)!==Math.floor((z-STEP)/35)&&p.sc>0.08){
        X.strokeStyle=`rgba(102,126,234,${p.sc*0.15})`;
        X.lineWidth=0.6;X.setLineDash([3,9]);
        X.beginPath();X.moveTo(prev.sx,prev.sy);X.lineTo(p.sx,p.sy);X.stroke();
        X.setLineDash([]);
      }

      // Edge lines (neon glow)
      X.strokeStyle=`rgba(102,126,234,${p.sc*0.4})`;
      X.lineWidth=Math.max(1,p.sc*2);
      X.beginPath();X.moveTo(prev.sx-prev.hw,prev.sy);X.lineTo(p.sx-hw,p.sy);X.stroke();
      X.beginPath();X.moveTo(prev.sx+prev.hw,prev.sy);X.lineTo(p.sx+hw,p.sy);X.stroke();
    }
    prev={sx:p.sx,sy:p.sy,hw:hw,sc:p.sc};
  }

  // Draw obstacles
  obs.forEach(o=>{
    const dz=o.z-ballZ;
    if(dz>1100||dz<0)return;
    const cx=cxAt(o.z);
    const owx=cx+o.lane*ROAD_HW; // obstacle world X
    const dx=owx-ballWX;
    const p=proj(dx,dz);
    if(!p||p.sc<0.03)return;

    const sz=Math.max(5,p.sc*44*(o.w/0.22+0.4));
    const ox=p.sx; // already projected to screen

    X.save();
    X.translate(ox,p.sy-sz*0.25);
    X.shadowBlur=p.sc>0.1?14:4;
    X.shadowColor='#ff3333';
    X.fillStyle='#ee2222';
    const bw=sz*o.w*3.0,bh=sz*0.5;
    X.beginPath();
    X.roundRect(-bw/2,-bh/2,bw,bh,Math.max(2,sz*0.08));
    X.fill();
    // Highlight
    X.fillStyle='rgba(255,255,255,0.1)';
    X.fillRect(-bw/2+bw*0.04,-bh/2+bh*0.06,bw*0.92,bh*0.16);
    X.shadowBlur=0;
    X.restore();
  });

  // Draw ball
  const p=proj(0,6); // dx=0 -> ball at screen center
  if(!p)p={sx:W/2,sy:H-40,sc:1};
  const by=H-40,br=11;

  // Shadow
  X.fillStyle='rgba(0,0,0,0.5)';
  X.beginPath();X.ellipse(p.sx+2,by+br+5,br*1.2,br*0.25,0,0,Math.PI*2);X.fill();

  // Ball glow
  if(state==='playing'){
    X.shadowBlur=10;X.shadowColor='#667eea';
  }
  // Ball body
  X.save();X.translate(p.sx,by);X.rotate(ballVX*-0.15);
  const g=X.createRadialGradient(-2.5,-2.5,0,0,0,br);
  g.addColorStop(0,'#ffffff');g.addColorStop(0.3,'#8899ee');g.addColorStop(0.75,'#5566dd');g.addColorStop(1,'#3344aa');
  X.fillStyle=g;
  X.beginPath();X.arc(0,0,br,0,Math.PI*2);X.fill();
  X.shadowBlur=0;
  // Shine
  X.fillStyle='rgba(255,255,255,0.38)';
  X.beginPath();X.ellipse(-br*0.2,-br*0.2,br*0.22,br*0.14,-0.3,0,Math.PI*2);X.fill();
  X.restore();

  // Motion trail
  if(state==='playing'&&Math.abs(ballVX)>0.01){
    for(let i=1;i<=3;i++){
      X.fillStyle=`rgba(102,126,234,${0.07/i})`;
      X.beginPath();X.arc(p.sx-ballVX*i*20*(0.65-i*0.08),by,br*(1-i*0.08),0,Math.PI*2);X.fill();
    }
  }

  // Horizon glow
  const hg=X.createRadialGradient(W/2,VY,0,W/2,VY,100);
  hg.addColorStop(0,'rgba(102,126,234,0.05)');hg.addColorStop(1,'transparent');
  X.fillStyle=hg;X.fillRect(0,VY-30,W,60);
}

function die(){
  state='dead';shake=16;
  if(score>best){best=score;localStorage.setItem('slope-best',best);bsE.textContent=best;}
  mask.classList.remove('hide');
  mask.innerHTML=`<div class="go">GAME OVER</div><div class="go-score">Score: ${score}</div><button id="btn2">RETRY</button>`;
  document.getElementById('btn2').onclick=()=>{reset();state='playing';mask.classList.add('hide');};
}

// === Input ===
const K={left:false,right:false};
document.addEventListener('keydown',e=>{
  if(['ArrowLeft','a','A'].includes(e.key)){K.left=true;e.preventDefault();if(state==='idle'){reset();state='playing';mask.classList.add('hide');}}
  if(['ArrowRight','d','D'].includes(e.key)){K.right=true;e.preventDefault();if(state==='idle'){reset();state='playing';mask.classList.add('hide');}}
  if([' ','Enter'].includes(e.key)){e.preventDefault();if(state!=='playing'){reset();state='playing';mask.classList.add('hide');}}
});
document.addEventListener('keyup',e=>{
  if(['ArrowLeft','a','A'].includes(e.key))K.left=false;
  if(['ArrowRight','d','D'].includes(e.key))K.right=false;
});
btn.onclick=()=>{reset();state='playing';mask.classList.add('hide');};

// Touch
let tLast=0;
C.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='playing'){reset();state='playing';mask.classList.add('hide');}tLast=e.touches[0].clientX;},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const dx=e.touches[0].clientX-tLast;ballVX+=dx*0.002;tLast=e.touches[0].clientX;},{passive:false});

// === Loop ===
function loop(){
  requestAnimationFrame(loop);
  update();
  X.clearRect(0,0,W,H);
  if(shake>0){shake--;X.save();X.translate((Math.random()-.5)*shake*1.5,(Math.random()-.5)*shake);}
  draw();
  if(shake>0)X.restore();
}
reset();
loop();
</script>

<script>
(function(){function h(){var d=Math.max(document.body?.scrollHeight||0,document.documentElement?.scrollHeight||0,document.body?.offsetHeight||0,document.documentElement?.offsetHeight||0,document.body?.clientHeight||0);if(d>100&&window.parent&&window.parent!==window)window.parent.postMessage({type:'game-resize',height:d+20},'*');}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){setTimeout(h,100);setTimeout(h,500);setTimeout(h,1000)});else{setTimeout(h,100);setTimeout(h,500);setTimeout(h,1000);}window.addEventListener('resize',h);if(typeof MutationObserver!=='undefined'){var o=new MutationObserver(function(){clearTimeout(o._timer);o._timer=setTimeout(h,200)});o.observe(document.body||document.documentElement,{childList:true,subtree:true,attributes:true})}})();
</script>
</body>
</html>
