<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slope - Play Free Online</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: auto; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Arial', sans-serif;
    }
    .game-wrapper {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    h1 { 
      color: #333; 
      margin-bottom: 20px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    canvas { 
      border: 4px solid #333;
      background: #0a0a1a;
      border-radius: 10px;
      display: block;
      margin: 0 auto;
    }
    .score-board {
      margin-top: 20px;
      font-size: 1.5em;
      color: #667eea;
      font-weight: bold;
      display: flex;
      justify-content: space-around;
    }
    .instructions {
      margin-top: 15px;
      color: #666;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>🏎️ Slope</h1>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div class="score-board">
      <div>Score: <span id="score">0</span></div>
      <div>Speed: <span id="speed">1.0</span>x</div>
    </div>
    <div class="instructions">
      ← → Arrow Keys to Move | Avoid Red Obstacles! | Speed Increases Over Time!
    </div>
  </div>
  
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const speedElement = document.getElementById('speed');

    // Read difficulty from URL params
    const urlParams = new URLSearchParams(window.location.search);
    const difficulty = urlParams.get('difficulty') || 'easy';
    const DIFFICULTY_SPEED = { easy: 2.5, medium: 3.5, hard: 4.5 };
    const BASE_SPEED = DIFFICULTY_SPEED[difficulty] || 2.5;

    let ball = {
      x: canvas.width / 2,
      y: canvas.height - 80,  // Start lower, within visible area
      radius: 12,
      dx: 0,
      dy: 0,  // Don't fly up initially - ball stays on "ground"
      speed: BASE_SPEED
    };

    let obstacles = [];
    let particles = [];
    let score = 0;
    let gameSpeed = 1.0;
    let gameLoop;
    let isPlaying = false;
    let trail = [];

    // Track boundaries (dashed lines)
    const TRACK_LEFT = 50;
    const TRACK_RIGHT = canvas.width - 50;
    const CEILING = 30;        // Top boundary - don't go above this
    const FLOOR = canvas.height - 40;  // Bottom boundary

    // Create neon grid effect
    function drawGrid() {
      ctx.strokeStyle = 'rgba(102, 126, 234, 0.1)';
      ctx.lineWidth = 1;

      // Vertical lines
      for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      // Horizontal lines (moving)
      for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y + (Date.now() / 50) % 40);
        ctx.lineTo(canvas.width, y + (Date.now() / 50) % 40);
        ctx.stroke();
      }
    }

    function createObstacle() {
      const width = 40 + Math.random() * 60;
      return {
        x: canvas.width + 10,
        y: FLOOR - 20,
        width: width,
        height: 20,
        color: '#FF0000'
      };
    }

    function createParticle(x, y) {
      return {
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 10,
        vy: -Math.random() * 10,
        life: 1.0,
        color: `hsl(${Math.random() * 60}, 100%, 50%)`
      };
    }

    function drawBall() {
      // Draw trail
      trail.forEach((point, index) => {
        const alpha = index / trail.length * 0.5;
        ctx.fillStyle = `rgba(102, 126, 234, ${alpha})`;
        ctx.beginPath();
        ctx.arc(point.x, point.y, ball.radius * (index / trail.length), 0, Math.PI * 2);
        ctx.fill();
      });

      // Draw ball
      const gradient = ctx.createRadialGradient(
        ball.x - 3, ball.y - 3, 0,
        ball.x, ball.y, ball.radius
      );
      gradient.addColorStop(0, '#FFF');
      gradient.addColorStop(0.3, '#667eea');
      gradient.addColorStop(1, '#764ba2');

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawObstacles() {
      obstacles.forEach(obs => {
        // Glow effect
        ctx.shadowBlur = 20;
        ctx.shadowColor = obs.color;
        ctx.fillStyle = obs.color;
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

        // Highlight
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.fillRect(obs.x + 2, obs.y + 2, obs.width - 4, 5);
        ctx.shadowBlur = 0;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 4, 4);
        ctx.globalAlpha = 1.0;
      });
    }

    function updateGame() {
      if (!isPlaying) return;

      // Update ball position
      ball.x += ball.dx;

      // Gravity keeps ball near the floor (simulating a slope surface)
      if (ball.y < FLOOR - ball.radius - 10) {
        ball.dy += 0.15;  // Gentle gravity pulls down
      } else {
        ball.dy = Math.min(ball.dy, 0);  // Don't go through floor
      }
      ball.y += ball.dy;

      // === BOUNDARY CHECKS ===
      // Left wall
      if (ball.x - ball.radius < TRACK_LEFT) {
        ball.x = TRACK_LEFT + ball.radius;
        ball.dx = Math.abs(ball.dx) * 0.5;
      }
      // Right wall
      if (ball.x + ball.radius > TRACK_RIGHT) {
        ball.x = TRACK_RIGHT - ball.radius;
        ball.dx = -Math.abs(ball.dx) * 0.5;
      }
      // Ceiling (prevent flying off top!)
      if (ball.y - ball.radius < CEILING) {
        ball.y = CEILING + ball.radius;
        ball.dy = Math.abs(ball.dy) * 0.3;  // Bounce back down
      }
      // Floor
      if (ball.y + ball.radius > FLOOR) {
        ball.y = FLOOR - ball.radius;
        ball.dy = 0;
      }

      // Friction on dx when no input
      ball.dx *= 0.98;

      // Add to trail
      trail.unshift({x: ball.x, y: ball.y});
      if (trail.length > 20) trail.pop();

      // Create particles
      if (Math.random() < 0.5) {
        particles.push(createParticle(ball.x, ball.y + ball.radius));
      }

      // Update obstacles
      obstacles.forEach((obs, index) => {
        obs.x -= ball.speed * gameSpeed;

        // Check collision
        if (
          ball.x + ball.radius > obs.x &&
          ball.x - ball.radius < obs.x + obs.width &&
          ball.y + ball.radius > obs.y &&
          ball.y - ball.radius < obs.y + obs.height
        ) {
          gameOver();
          return;
        }

        // Remove off-screen obstacles
        if (obs.x + obs.width < 0) {
          obstacles.splice(index, 1);
          score += 10;
          scoreElement.textContent = score;
        }
      });

      // Update particles
      particles.forEach((p, index) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.5;
        p.life -= 0.02;

        if (p.life <= 0) {
          particles.splice(index, 1);
        }
      });

      // Spawn new obstacles
      if (Math.random() < 0.02 * gameSpeed) {
        obstacles.push(createObstacle());
      }

      // Increase speed over time
      gameSpeed += 0.0008;
      speedElement.textContent = (gameSpeed * BASE_SPEED).toFixed(1) + 'x';
    }

    function drawGame() {
      // Clear canvas
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();
      drawObstacles();
      drawParticles();
      drawBall();

      // Draw track borders
      ctx.strokeStyle = '#667eea';
      ctx.lineWidth = 4;
      ctx.setLineDash([20, 10]);
      ctx.beginPath();
      ctx.moveTo(TRACK_LEFT, 0);
      ctx.lineTo(TRACK_LEFT, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(TRACK_RIGHT, 0);
      ctx.lineTo(TRACK_RIGHT, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw start message
      if (!isPlaying) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#667eea';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Click to Start!', canvas.width / 2, canvas.height / 2);
        ctx.font = '24px Arial';
        ctx.fillStyle = 'white';
        ctx.fillText('\u2190 \u2192 Arrow Keys to Move', canvas.width / 2, canvas.height / 2 + 50);
      }
    }

    function gameOver() {
      isPlaying = false;
      clearInterval(gameLoop);

      ctx.fillStyle = 'rgba(255, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER!', canvas.width / 2, canvas.height / 2 - 30);
      ctx.font = '24px Arial';
      ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
      ctx.fillText('Click to Restart', canvas.width / 2, canvas.height / 2 + 60);
    }

    function startGame() {
      ball = {
        x: canvas.width / 2,
        y: canvas.height - 80,
        radius: 12,
        dx: 0,
        dy: 0,
        speed: BASE_SPEED
      };
      obstacles = [];
      particles = [];
      trail = [];
      score = 0;
      gameSpeed = 1.0;
      isPlaying = true;

      scoreElement.textContent = score;
      speedElement.textContent = BASE_SPEED.toFixed(1) + 'x';

      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(() => {
        updateGame();
        drawGame();
      }, 1000 / 60);
    }

    document.addEventListener('keydown', (e) => {
      if (!isPlaying) return;

      switch(e.key) {
        case 'ArrowLeft':
          ball.dx = -BASE_SPEED * 1.5;
          e.preventDefault();
          break;
        case 'ArrowRight':
          ball.dx = BASE_SPEED * 1.5;
          e.preventDefault();
          break;
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        ball.dx *= 0.3;
      }
    });

    canvas.addEventListener('click', () => {
      if (!isPlaying) startGame();
    });

    drawGame();



</script></script>
<script>
// Auto-resize iframe to fit game content perfectly
(function() {
  function sendHeight() {
    var h = Math.max(
      document.body?.scrollHeight || 0,
      document.documentElement?.scrollHeight || 0,
      document.body?.offsetHeight || 0,
      document.documentElement?.offsetHeight || 0,
      document.body?.clientHeight || 0
    );
    if (h > 100) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'game-resize', height: h + 20 }, '*');
      }
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(sendHeight, 100);
      setTimeout(sendHeight, 500);
      setTimeout(sendHeight, 1000);
    });
  } else {
    setTimeout(sendHeight, 100);
    setTimeout(sendHeight, 500);
    setTimeout(sendHeight, 1000);
  }
  window.addEventListener('resize', sendHeight);
  if (typeof MutationObserver !== 'undefined') {
    var observer = new MutationObserver(function() {
      clearTimeout(observer._timer);
      observer._timer = setTimeout(sendHeight, 200);
    });
    observer.observe(document.body || document.documentElement, {
      childList: true, subtree: true, attributes: true
    });
  }
})();
</script>
</body>
</html>
