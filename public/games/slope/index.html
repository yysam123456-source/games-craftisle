<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"content="width=device-width,initial-scale=1,user-scalable=no">
<title>Slope</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:system-ui,-apple-system,sans-serif}
#c{display:block;border-radius:8px;background:#111}
</style>
</head>
<body>
<canvas id="c"width="800"height="600"></canvas>
<script>
"use strict";
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=800,H=600;

/* ============================================================
   Slope — Pseudo-3D endless runner
   ============================================================ */

// ---- Projection constants ----
const FOCAL_LEN=280;       // focal length (controls FOV)
const CAMERA_H=800;        // camera height above ground
const ROAD_WIDTH=2000;     // road half-width at camera Z=0

/**
 * project(wx, wz) -> {x, y, scale} | null
 * wx: world X (lateral, relative to track center)
 * wz: distance ahead of camera (always >= 0)
 */
function project(wx,wz){
  if(wz<=1)return null;
  const scale=FOCAL_LEN/(FOCAL_LEN+wz);
  return{
    x:W/2+wx*scale*(W/ROAD_WIDTH),
    y:H*.42+(H*.58)*(1-scale),
    scale:scale
  };
}

// ---- Game state ----
let state='idle';          // idle|play|gameover
let score=0,best=+localStorage.getItem('slopeBest')||0;
let speed=300;             // forward speed (world units/frame)
let playerX=0,playerVX=0;  // lateral position & velocity (-1..1)
let worldZ=0;              // how far we've traveled
let shake=0;

// ---- Track segments ----
const SEG_L=200;           // segment length in world units
const track=[];            // [{curve, x}] curve=-1..1, x=cumulative offset
// ---- Obstacles ----
const obstacles=[];        // [{z, lane, width}]

// ---- Input ----
const keys={left:false,right:false};

/* ============================================================
   Track generation
   ============================================================ */
function ensureSegments(count){
  while(track.length<count){
    const prev=track[track.length-1]||{curve:0,x:0};
    // Smooth random walk for curve
    let c=prev.curve+(Math.random()-.5)*.055;
    c=Math.max(-.7,Math.min(.7,c));
    // Occasional sharp turn
    if(Math.random()<.025)c+=(Math.random()-.5)*.5;
    c=Math.max(-.7,Math.min(.7,c));
    track.push({curve:c,x:prev.x+c*SEG_L});
  }
}

/** Get track centerline X at given world-Z */
function trackCenterX(z){
  const idx=Math.floor(z/SEG_L);
  const frac=z/SEG_L-idx;
  const s0=track[idx>=0&&idx<track.length?idx:0]||{x:0};
  const s1=track[idx+1>=0&&idx+1<track.length?idx+1:0]||s0;
  return s0.x+(s1.x-s0.x)*frac;
}

/* ============================================================
   Obstacles
   ============================================================ */
function maybeSpawnObstacle(){
  if(obstacles.length>15)return;
  const lastZ=obstacles.length?Math.max(...obstacles.map(o=>o.z)):worldZ+5000;
  if(lastZ<worldZ+3200)return;
  obstacles.push({
    z:lastZ+Math.random()*2000,
    lane:(Math.random()-.5)*1.6,
    w:.18+Math.random()*.35
  });
}

function updateObstacles(){
  for(let i=obstacles.length-1;i>=0;i--){
    if(obstacles[i].z<worldZ-150){score+=10;obstacles.splice(i,1);}
  }
  if(Math.random()<.02)speed>350?maybeSpawnObstacle():void 0;
  else if(Math.random()<.008)maybeSpawnObstacle();
}

/* ============================================================
   Collision detection
   ============================================================ */
function checkCollision(){
  const pw=160;  // ball collision radius (world units)
  for(const o of obstacles){
    const dz=o.z-worldZ;
    if(dz>850||dz<=0)continue;
    const ox=trackCenterX(o.z)+o.lane*ROAD_WIDTH*.38;
    const px=trackCenterX(worldZ)+playerX*ROAD_WIDTH*.35;
    const dist=Math.abs(px-ox);
    if(dist<(o.w+.16)*ROAD_WIDTH*.36&&dz<650)return true;
  }
  return false;
}

/* ============================================================
   Reset / Game logic
   ============================================================ */
function resetGame(){
  track.length=0;obstacles.length=0;
  worldZ=0;playerX=0;playerVX=0;
  speed=300;score=0;shake=0;
  ensureSegments(30);
}

function update(){
  if(state!=='play')return;

  // Accelerate
  speed+=.4;if(speed>1050)speed=1050;
  worldZ+=speed*.04;
  ensureSegments(Math.floor(worldZ/SEG_L)+28);

  // Steering
  const STEER=2.4;
  if(keys.left)playerVX-=STEER;
  if(keys.right)playerVX+=STEER;
  playerVX*=.87;
  playerX+=playerVX;
  // Clamp
  if(playerX<-1.12){playerX=-1.12;playerVX*=.03;}
  if(playerX>1.12){playerX=1.12;playerVX*=-Math.abs(playerVX)*.03;}

  // Curve push
  const ci=Math.floor(worldZ/SEG_L);
  if(track[ci])playerVX+=track[ci].curve*.0045;

  updateObstacles();
  if(checkCollision()){gameOver();return;}
}

function gameOver(){
  state='gameover';shake=25;
  if(score>best){best=score;localStorage.setItem('slopeBest',best);}
}

/* ============================================================
   RENDERING
   ============================================================ */
function draw(){
  // === 1. SKY gradient ===
  const skyGrad=ctx.createLinearGradient(0,0,0,H*.44);
  skyGrad.addColorStop(0,'#08081a');
  skyGrad.addColorStop(.6,'#101030');
  skyGrad.addColorStop(1,'#181848');
  ctx.fillStyle=skyGrad;
  ctx.fillRect(0,0,W,H*.46);

  // === 2. GROUND fill ===
  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(0,H*.44,W,H*.56);

  // Stars (static dots in sky)
  ctx.fillStyle='rgba(255,255,255,.25)';
  for(let i=0;i<40;i++){
    // Deterministic "random" positions based on index
    const sx=((i*137+43)%W);
    const sy=((i*293+17)%(H*.4));
    const sr=.5+(i%3)*.4;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();
  }

  // === 3. DRAW ROAD (far -> near) ===
  const baseTrackX=trackCenterX(worldZ);
  const MAX_DRAW_Z=11000;
  const STRIP_GAP=260;  // world units between strip pairs

  let prevL=null,prevR=null;

  for(let dz=MAX_DRAW_DZ=MAX_DRAW_Z;dz>=0;dz-=STRIP_GAP){
    const cz=worldZ+dz;
    const cx=trackCenterX(cz);
    const relX=cx-baseTrackX;

    const leftP=project(relX-ROAD_WIDTH,dz);
    const rightP=project(relX+ROAD_WIDTH,dz);
    if(!leftP||!rightP)continue;
    if(leftP.scale<.004)continue;  // skip tiny far strips

    // --- Road polygon ---
    const roadAlpha=.08+leftP.scale*.65;
    ctx.fillStyle=`rgba(20,24,50,${Math.min(1,roadAlpha)})`;
    ctx.beginPath();
    if(prevL){
      ctx.moveTo(prevL.x,prevL.y);
      ctx.lineTo(prevR.x,prevR.y);
      ctx.lineTo(rightP.x,rightP.y);
      ctx.lineTo(leftP.x,leftP.y);
    }
    ctx.closePath();ctx.fill();

    // --- Left edge line (bright cyan) ---
    const edgeAlpha=Math.min(.9,leftP.scale*.55);
    ctx.strokeStyle=`rgba(0,220,255,${edgeAlpha})`;
    ctx.lineWidth=Math.max(1,leftP.scale*3.5);
    ctx.beginPath();
    if(prevL)ctx.moveTo(prevL.x,prevL.y);
    ctx.lineTo(leftP.x,leftP.y);
    ctx.stroke();

    // --- Right edge line ---
    ctx.strokeStyle=`rgba(0,220,255,${edgeAlpha})`;
    ctx.lineWidth=Math.max(1,leftP.scale*3.5);
    ctx.beginPath();
    if(prevR)ctx.moveTo(prevR.x,prevR.y);
    ctx.lineTo(rightP.x,rightP.y);
    ctx.stroke();

    // --- Center dashed line ---
    if(leftP.scale>.07){
      const dashAlpha=leftP.scale*.18;
      ctx.strokeStyle=`rgba(0,200,255,${dashAlpha})`;
      ctx.lineWidth=1.2;
      ctx.setLineDash([4,14]);
      ctx.beginPath();
      const midX=(leftP.x+rightP.x)/2,midY=(leftP.y+rightP.y)/2;
      if(prevL){
        const pmidX=(prevL.x+prevR.x)/2,pmidY=(prevL.y+prevR.y)/2;
        ctx.moveTo(pmidX,pmidY);
      }
      ctx.lineTo(midX,midY);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // --- Road stripes (perpendicular lines across road) ---
    if(leftP.scale>.03&&dz%STRIP_GAP===0){
      const stripeAlpha=leftP.scale*.22;
      ctx.strokeStyle=`rgba(60,80,150,${stripeAlpha})`;
      ctx.lineWidth=Math.max(.5,leftP.scale*1.5);
      ctx.beginPath();
      ctx.moveTo(leftP.x,leftP.y);
      ctx.lineTo(rightP.x,rightP.y);
      ctx.stroke();
    }

    prevL=leftP;prevR=rightP;
  }

  // === 4. OBSTACLES (red blocks) ===
  for(const o of obstacles){
    const dz=o.z-worldZ;
    if(dz>MAX_DRAW_Z||dz<=0)continue;
    const cx=trackCenterX(o.z);
    const ox=baseTrackX?cx-baseTrackX+o.lane*ROAD_WIDTH*.42:o.lane*ROAD_WIDTH*.42;
    const op=project(ox,dz);
    if(!op||op.scale<.01)continue;

    const ow=Math.max(10,op.scale*70*(o.w/.27));
    const oh=Math.max(6,op.scale*28);
    const oy=op.y-oh*.5;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.fillRect(op.x-ow*.45,oy+oh*.9,ow*.9,oh*.18);

    // Block body
    ctx.save();ctx.translate(op.x,oy);

    // Glow
    if(op.scale>.08){
      ctx.shadowColor='#ff2222';
      ctx.shadowBlur=op.scale>0.15?22:8;
    }
    ctx.fillStyle='#dd2222';
    ctx.beginPath();
    ctx.roundRect(-ow/2,-oh/2,ow,oh,Math.max(2,op.scale*5));
    ctx.fill();

    // Highlight stripe
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.13)';
    ctx.fillRect(-ow*.4,-oh*.35,ow*.8,oh*.2);
    ctx.restore();
  }

  // === 5. BALL (fixed near bottom-center) ===
  const bx=W/2+playerX*76;
  const by=H-62;
  const br=14;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.beginPath();
  ctx.ellipse(bx+3,by+br+8,br*1.4,br*.2,0,0,Math.PI*2);
  ctx.fill();

  // Ball body with gradient
  ctx.save();ctx.translate(bx,by);ctx.rotate(playerVX*-.15);
  const ballGrad=ctx.createRadialGradient(-3,-3,0,0,0,br);
  ballGrad.addColorStop(0,'#ffffff');
  ballGrad.addColorStop(.25,'#99bbff');
  ballGrad.addColorStop('.6','#5577dd');
  ballGrad.addColorStop(1,'#3344aa');

  if(state==='play'){
    ctx.shadowColor='#6699ff';
    ctx.shadowBlur=16;
  }
  ctx.fillStyle=ballGrad;
  ctx.beginPath();ctx.arc(0,0,br,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Shine spot
  ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.beginPath();
  ctx.ellipse(-br*.22,-br*.22,br*.22,br*.11,-.3,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Motion trail
  if(state==='play'&&Math.abs(playerVX)>.015){
    for(let t=1;t<=4;t++){
      const ta=.06/t;
      ctx.fillStyle=`rgba(100,150,255,${ta})`;
      ctx.beginPath();
      ctx.arc(bx-playerVX*t*22*(.6-t*.08),by,br*(1-t*.07),0,Math.PI*2);
      ctx.fill();
    }
  }

  // === 6. UI OVERLAY (when idle/gameover) ===
  if(state==='idle'||state==='gameover'){
    ctx.fillStyle='rgba(5,5,15,.88)';
    ctx.fillRect(0,0,W,H);

    if(state==='idle'){
      // Title
      ctx.textAlign='center';
      ctx.font='900 64px system-ui';
      ctx.fillStyle='#6688ff';
      ctx.shadowColor='#4466dd';
      ctx.shadowBlur=40;
      ctx.fillText('SLOPE',W/2,H*.38);
      ctx.shadowBlur=0;

      ctx.font='400 16px system-ui';
      ctx.fillStyle='#6677aa';
      ctx.fillText('Roll down the endless slope',W/2,H*.38+32);

      ctx.font='400 13px system-ui';
      ctx.fillStyle='#445577';
      ctx.fillText('\u2190 \u2192 or A/D to steer  \u2022  Avoid red blocks',W/2,H*.38+60);

      ctx.font='700 15px system-ui';
      ctx.fillStyle='#fff';
      ctx.fillText('[ PRESS SPACE OR TAP TO START ]',W/2,H*.52);
    }else{
      // Game over
      ctx.textAlign='center';
      ctx.font='900 48px system-ui';
      ctx.fillStyle='#ff4444';
      ctx.fillText('GAME OVER',W/2,H*.38);

      ctx.font='700 22px system-ui';
      ctx.fillStyle='#aaccee';
      ctx.fillText(`Score: ${score}`,W/2,H*.38+40);

      if(score>=best){
        ctx.font='700 16px system-ui';
        ctx.fillStyle='#ffcc33';
        ctx.fillText('\u2605 NEW BEST!',W/2,H*.38+68);
      }else{
        ctx.font='400 14px system-ui';
        ctx.fillStyle='#7788aa';
        ctx.fillText(`Best: ${best}`,W/2,H*.38+68);
      }

      ctx.font='700 15px system-ui';
      ctx.fillStyle='#fff';
      ctx.fillText('[ SPACE OR TAP TO RETRY ]',W/2,H*.54);
    }
  }else{
    // === In-game HUD ===
    ctx.textAlign='left';
    ctx.font='700 14px monospace';
    ctx.fillStyle='#5577cc';
    ctx.fillText(`SCORE ${score}`,16,28);
    ctx.textAlign='right';
    ctx.fillText(`BEST ${best}`,W-16,28);
    ctx.textAlign='center';
    ctx.fillText(`${(speed/300).toFixed(1)}x`,W/2,28);
  }
}

/* ============================================================
   INPUT HANDLING
   ============================================================ */
document.addEventListener('keydown',e=>{
  if(['ArrowLeft','a','A'].includes(e.key)){keys.left=true;e.preventDefault();if(state!=='play'){resetGame();state='play';}}
  if(['ArrowRight','d','D'].includes(e.key)){keys.right=true;e.preventDefault();if(state!=='play'){resetGame();state='play';}}
  if([' ','Enter'].includes(e.key)&&state!=='play'){e.preventDefault();resetGame();state='play';}
});
document.addEventListener('keyup',e=>{
  if(['ArrowLeft','a','A'].includes(e.key))keys.left=false;
  if(['ArrowRight','d','D'].includes(e.key))keys.right=false;
});

// Touch support
let touchStartX=null;
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  touchStartX=e.touches[0].clientX;
  if(state!=='play'){resetGame();state='play';}
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(touchStartX===null)return;
  const dx=e.touches[0].clientX-touchStartX;
  playerVX+=dx*.0032;
  touchStartX=e.touches[0].clientX;
},{passive:false});

/* ============================================================
   GAME LOOP
   ============================================================ */
function loop(){
  requestAnimationFrame(loop);
  update();

  ctx.setTransform(1,0,0,1,0,0); // Reset transform
  ctx.clearRect(0,0,W,H);

  // Screen shake
  if(shake>0){
    shake--;
    ctx.save();
    ctx.translate((Math.random()-.5)*shake*2.2,(Math.random()-.5)*shake*1.5);
  }

  draw();
  if(shake>0)ctx.restore();
}

loop();

/* Iframe resize bridge */
(function(){
  function postHeight(){
    var h=Math.max(
      document.body?.scrollHeight||0,
      document.documentElement?.scrollHeight||0,
      document.body?.offsetHeight||0,
      H
    );
    if(h>50&&window.parent&&window.parent!==window)
      window.parent.postMessage({type:'game-resize',height:h+20},'*');
  }
  if(document.readyState==='loading')
    document.addEventListener('DOMContentLoaded',()=>{setTimeout(postHeight,100);setTimeout(postHeight,500);});
  else{setTimeout(postHeight,100);setTimeout(postHeight,500);}
  window.addEventListener('resize',postHeight);
})();
</script>
</body>
</html>
