<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slope - Play Free Online</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      display:flex; justify-content:center; align-items:center;
      min-height:auto; background:linear-gradient(135deg,#0a0a1a,#1a1a2e);
      font-family:'Segoe UI',Arial,sans-serif; overflow:hidden;
    }
    .game-wrapper { text-align:center; }
    canvas {
      border-radius:12px;
      display:block; cursor:pointer;
      box-shadow:0 0 60px rgba(102,126,234,0.15), inset 0 0 30px rgba(0,0,0,0.3);
    }
    .hud {
      margin-top:14px; color:#a0aec0; font-size:14px; font-weight:600;
      display:flex; justify-content:center; gap:32px;
    }
    .hud span { color:#667eea; }
  </style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="c" width="640" height="480"></canvas>
  <div class="hud">Score:<span id="sc">0</span> &nbsp; Best:<span id="bs">0</span> &nbsp; Speed:<span id="sp">1.0x</span></div>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;

// Difficulty from URL
const urlP=new URLSearchParams(location.search);
const diff=urlP.get('difficulty')||'medium';
const DIFF={easy:{spd:1,obs:0.012,acc:0.0004},medium:{spd:1.6,obs:0.02,acc:0.0007},hard:{spd:2.2,obs:0.032,acc:0.0012}};
const CFG=DIFF[diff]||DIFF.medium;

// --- State ---
let state='idle'; // idle | playing | dead
let score=0,best=+localStorage.getItem('slope-best')||0;
let speed=CFG.spd;
let ballX=0; // -1..1 normalized lane position
let ballVX=0; // horizontal velocity
let roadW=3000; // virtual road width units
let obsList=[]; // obstacles
let time=0;
let deathTimer=0;
let shakeX=0,shakeY=0;

// Perspective settings
const VANISH_Y=H*0.28;
const HORIZON_Y=H*0.22;
const ROAD_BOTTOM_Y=H-10;
function roadAtY(y){ // returns half-width of road screen-pixels at y
  const t=(y-HORIZON_Y)/(ROAD_BOTTOM_Y-HORIZON_Y);
  return Math.max(20, t*t*280);
}

// --- Input ---
const keys={left:false,right:false};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){keys.left=true;e.preventDefault();if(state==='idle')start();}
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){keys.right=true;e.preventDefault();if(state==='idle')start();}
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=false;
});
canvas.addEventListener('click',()=>{if(state!=='playing')start();});

// Also support touch/canvas-relative pointer
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='playing')start();},{passive:false});

// --- Obstacle ---
function spawnObs(){
  const lane=(Math.random()-0.5)*0.75; // -0.375..0.375
  const types=['block','block','wide','twin'];
  const type=types[Math.floor(Math.random()*types.length)];
  obsList.push({z:2000+Math.random()*500,lane:lane,type:type,w:type==='wide'?0.35:0.18,rotZ:(Math.random()-0.5)*0.15,color:`hsl(${Math.random()*30},90%,55%)`});
}

// --- Start / Reset ---
function start(){
  state='playing';
  score=0;speed=CFG.spd;time=0;
  ballX=0;ballVX=0;obsList=[];
  shakeX=0;shakeY=0;
  deathTimer=0;
  updateHUD();
}

function die(){
  state='dead';deathTimer=0;
  shakeX=(Math.random()-0.5)*20;
  shakeY=(Math.random()-0.5)*16;
  if(score>best){best=score;localStorage.setItem('slope-best',best);}
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('bs').textContent=best;
  document.getElementById('sp').textContent=speed.toFixed(1)+'x';
}

// === DRAW HELPERS ===
function drawSlope(){
  // Sky gradient
  const skyGrad=ctx.createLinearGradient(0,0,0,HORIZON_Y);
  skyGrad.addColorStop(0,'#050510');
  skyGrad.addColorStop(1,'#0f0f2a');
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,HORIZON_Y);

  // Ground / slope fill — dark gradient simulating depth
  const gndGrad=ctx.createLinearGradient(0,HORIZON_Y,0,H);
  gndGrad.addColorStop(0,'#111122');
  gndGrad.addColorStop(0.3,'#0d0d1a');
  gndGrad.addColorStop(1,'#070712');
  ctx.fillStyle=gndGrad;ctx.fillRect(0,HORIZON_Y,W,H-HORIZON_Y);

  // Road surface — trapezoid
  const rbw=roadAtY(ROAD_BOTTOM_Y);
  const rwTop=Math.max(8,roadAtY(HORIZON_Y+2));
  ctx.beginPath();
  ctx.moveTo(W/2-rbw,ROAD_BOTTOM_Y);
  ctx.lineTo(W/2+rbw,ROAD_BOTTOM_Y);
  ctx.lineTo(W/2+rwTop,HORIZON_Y+2);
  ctx.lineTo(W/2-rwTop,HORIZON_Y+2);
  ctx.closePath();

  // Road gradient (darker center → lighter edges feel)
  const rdGrad=ctx.createLinearGradient(W/2-rbw,ROAD_BOTTOM_Y,W/2+rbw,ROAD_BOTTOM_Y);
  rdGrad.addColorStop(0,'#18182e');
  rdGrad.addColorStop(0.5,'#1a1a30');
  rdGrad.addColorStop(1,'#18182e');
  ctx.fillStyle=rdGrad;ctx.fill();

  // Road edge glow lines
  ctx.strokeStyle='rgba(102,126,234,0.25)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W/2-rbw,ROAD_BOTTOM_Y);ctx.lineTo(W/2-rwTop,HORIZON_Y+2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W/2+rbw,ROAD_BOTTOM_Y);ctx.lineTo(W/2+rwTop,HORIZON_Y+2);ctx.stroke();

  // Grid lines on road (perspective)
  const gridCount=18;
  const scrollOff=((time*speed*120)%100)/100;
  for(let i=0;i<=gridCount;i++){
    let frac=(i/gridCount-scrollOff);
    while(frac<0)frac+=1;while(frac>=1)frac-=1;
    const y=HORIZON_Y+2+(ROAD_BOTTOM_Y-HORIZON_Y-2)*(frac*frac); // quadratic for perspective
    if(y<HORIZON_Y+3||y>ROAD_BOTTOM_Y)continue;
    const hw=roadAtY(y);
    const alpha=0.06+frac*0.12;
    ctx.strokeStyle=`rgba(102,126,234,${alpha})`;ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(W/2-hw,y);ctx.lineTo(W/2+hw,y);ctx.stroke();
  }

  // Side walls / guardrails (vertical lines at edges)
  ctx.strokeStyle='rgba(102,126,234,0.08)';ctx.lineWidth=1;
  for(let i=0;i<=10;i++){
    const frac=i/10;
    const y=HORIZON_Y+2+(ROAD_BOTTOM_Y-HORIZON_Y-2)*(frac*frac);
    const hw=roadAtY(y)+6;
    ctx.globalAlpha=frac*0.4;
    ctx.beginPath();ctx.moveTo(W/2-hw,y);ctx.lineTo(W/2-hw,y+3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W/2+hw,y);ctx.lineTo(W/2+hw,y+3);ctx.stroke();
  }
  ctx.globalAlpha=1;

  // Distant glow at horizon
  const hGlow=ctx.createRadialGradient(W/2,HORIZON_Y,0,W/2,HORIZON_Y,180);
  hGlow.addColorStop(0,'rgba(102,126,234,0.07)');
  hGlow.addColorStop(1,'transparent');
  ctx.fillStyle=hGlow;ctx.fillRect(0,HORIZON_Y-80,W,160);
}

function worldToScreen(lane,z){
  // z: distance ahead (larger=farther). We clip far.
  if(z<1)z=1;
  const scale=400/z; // perspective divisor
  const y=VANISH_Y+scale*220;
  if(y>H)return null;
  const hw=roadAtY(y);
  const x=W/2+lane*hw;
  return{x,y,scale,hw};
}

function drawObstacle(obs){
  const p=worldToScreen(obs.lane,obs.z);
  if(!p)return;
  const sz=Math.max(4,p.scale*(obs.type==='twin'?28:obs.type==='wide'?40:32));
  const w=sz*obs.w/(obs.type==='twin'?0.9:1);

  ctx.save();
  ctx.translate(p.x,p.y-sz*0.4);
  ctx.rotate(obs.rotZ*(1-Math.min(1,p.scale/40))); // less rotation when close

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.fillRect(-w*0.9,sz*0.1,w*1.8,sz*0.15);

  // Body
  ctx.shadowBlur=p.scale>10?15:6;
  ctx.shadowColor=obs.color;
  ctx.fillStyle=obs.color;
  // Rounded block
  const r=sz*0.12;
  ctx.beginPath();
  ctx.roundRect(-w/2,-sz,w,sz,r);
  ctx.fill();

  // Top highlight
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(-w/2+sz*0.08,-sz+sz*0.08,w-sz*0.16,sz*0.2);
  ctx.shadowBlur=0;
  ctx.restore();

  // Red warning stripe for wide blocks
  if(obs.type==='wide'&&p.scale>8){
    ctx.save();
    ctx.translate(p.x,p.y-sz*0.4);
    ctx.rotate(obs.rotZ*(1-Math.min(1,p.scale/40)));
    ctx.fillStyle='rgba(255,50,50,0.3)';
    for(let s=0;s<3;s++){
      ctx.fillRect(-w/2+s*w/3,-sz+sz*0.4,w/6,sz*0.06);
    }
    ctx.restore();
  }
}

function drawBall(){
  // Ball screen position
  const targetX=W/2+ballX*roadAtY(H-60);
  const ballY=H-55;
  const radius=state==='dead'?14:13;

  // Shadow under ball
  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.ellipse(targetX+2,ballY+radius+4,radius*1.1,radius*0.35,0,0,Math.PI*2);
  ctx.fill();

  // Ball tilt based on velocity
  const tilt=ballVX*-0.15;

  ctx.save();
  ctx.translate(targetX,ballY);
  ctx.rotate(tilt);

  // Ball glow
  if(state==='playing'){
    ctx.shadowBlur=20;
    ctx.shadowColor='#667eea';
  }
  // Main ball
  const bGrad=ctx.createRadialGradient(-radius*0.25,-radius*0.25,0,0,0,radius);
  bGrad.addColorStop(0,'#ffffff');
  bGrad.addColorStop(0.35,'#a0b0ff');
  bGrad.addColorStop(0.75,'#667eea');
  bGrad.addColorStop(1,'#4338ca');
  ctx.fillStyle=bGrad;
  ctx.beginPath();
  ctx.arc(0,0,radius,0,Math.PI*2);
  ctx.fill();

  // Shine
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(-radius*0.3,-radius*0.3,radius*0.32,radius*0.22,-0.4,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=0;
  ctx.restore();

  // Motion trail
  if(state==='playing'&&Math.abs(ballVX)>0.03){
    for(let i=1;i<=4;i++){
      const tx=targetX-ballVX*i*8*(0.7-i*0.12);
      const alpha=(1-i/5)*0.15;
      ctx.fillStyle=`rgba(102,126,234,${alpha})`;
      ctx.beginPath();
      ctx.arc(tx,ballY,radius*(1-i*0.15),0,Math.PI*2);
      ctx.fill();
    }
  }
}

function drawUI(){
  if(state==='idle'){
    // Overlay
    ctx.fillStyle='rgba(5,5,16,0.78)';
    ctx.fillRect(0,0,W,H);

    // Title
    ctx.fillStyle='#667eea';
    ctx.font='bold 52px "Segoe UI",Arial';
    ctx.textAlign='center';
    ctx.fillText('SLOPE',W/2,H/2-30);

    // Subtitle
    ctx.font='22px "Segoe UI",Arial';
    ctx.fillStyle='#a0b0ff';
    ctx.fillText('Roll down the infinite slope',W/2,H/2+8);

    // Controls hint
    ctx.font='17px "Segoe UI",Arial';
    ctx.fillStyle='rgba(160,174,192,0.7)';
    ctx.fillText('\u2190 \u2192  or  A/D  to Steer',W/2,H/2+44);

    // Click prompt
    const pulse=0.6+Math.sin(Date.now()/350)*0.4;
    ctx.fillStyle=`rgba(102,126,234,${pulse})`;
    ctx.font='bold 19px "Segoe UI",Arial';
    ctx.fillText('[ Click or Press Any Key ]',W/2,H/2+82);

    // Difficulty badge
    ctx.font='12px "Segoe UI",Arial';
    ctx.fillStyle='rgba(102,126,234,0.5)';
    ctx.textContent='Difficulty: '+diff.charAt(0).toUpperCase()+diff.slice(1);
    ctx.fillText('Difficulty: '+diff.charAt(0).toUpperCase()+diff.slice(1),W/2,H/2+115);
  }

  if(state==='dead'){
    deathTimer++;
    const a=Math.min(1,deathTimer/30);
    ctx.fillStyle=`rgba(180,0,0,${a*0.72})`;
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle='#fff';
    ctx.font='bold 46px "Segoe UI",Arial';
    ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-20);

    ctx.font='24px "Segoe UI",Arial';
    ctx.fillStyle='#ffcdd2';
    ctx.fillText('Score: '+score,W/2,H/2+20);

    ctx.font='18px "Segoe UI",Arial';
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillText('Click or press any key to retry',W/2,H/2+58);
  }
}

// === MAIN LOOP ===
function update(){
  if(state==='playing'){
    time+=1/60;

    // Steering input
    const accel=0.022;
    if(keys.left)ballVX-=accel;
    if(keys.right)ballVX+=accel;

    // Apply velocity with damping & speed-dependent friction
    ballVX*=0.925;
    // Clamp
    const maxVX=0.055;
    if(ballVX>maxVX)ballVX=maxVX;
    if(ballVX<-maxVX)ballVX=-maxVX;
    ballX+=ballVX;

    // Lane boundaries (-1..1)
    const limit=0.88;
    if(ballX<-limit){ballX=-limit;ballVX*=0.2;}
    if(ballX>limit){ballX=limit;ballVX*=0.2;}

    // Move obstacles closer
    speed+=CFG.acc;
    for(let i=obsList.length-1;i>=0;i--){
      obsList[i].z-=speed*50;
      if(obsList[i].z<5){
        obsList.splice(i,1);
        score+=1;
        continue;
      }
      // Collision check
      const obs=obsList[i];
      if(obs.z<80&&obs.z>10){
        // Approximate collision: compare lane positions
        const dx=Math.abs(ballX-obs.lane);
        const collisionW=obs.type==='wide'?0.42:obs.type==='twin'?0.26:0.24;
        if(dx<collisionW){
          die();
          return;
        }
      }
    }

    // Spawn obstacles
    if(Math.random()<CFG.obs*speed){
      spawnObs();
    }

    // Shake decay
    shakeX*=0.85;shakeY*=0.85;
  }else if(state==='dead'){
    shakeX*=0.88;shakeY*=0.88;
  }

  updateHUD();
}

function render(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  // Screen shake on death
  if(Math.abs(shakeX)>0.1||Math.abs(shakeY)>0.1){
    ctx.translate(shakeX,shakeY);
  }

  drawSlope();

  // Draw obstacles (far to near)
  obsList.sort((a,b)=>b.z-a.z);
  obsList.forEach(drawObstacle);

  drawBall();
  drawUI();

  ctx.restore();
}

function loop(){
  update();
  requestAnimationFrame(loop);
  render();
}

document.getElementById('bs').textContent=best;
loop();
</script>

<script>
(function(){function h(){var d=Math.max(document.body?.scrollHeight||0,document.documentElement?.scrollHeight||0,document.body?.offsetHeight||0,document.documentElement?.offsetHeight||0,document.body?.clientHeight||0);if(d>100&&window.parent&&window.parent!==window)window.parent.postMessage({type:'game-resize',height:d+20},'*');}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){setTimeout(h,100);setTimeout(h,500);setTimeout(h,1000)});else{setTimeout(h,100);setTimeout(h,500);setTimeout(h,1000);}window.addEventListener('resize',h);if(typeof MutationObserver!=='undefined'){var o=new MutationObserver(function(){clearTimeout(o._timer);o._timer=setTimeout(h,200)});o.observe(document.body||document.documentElement,{childList:true,subtree:true,attributes:true})}})();
</script>
</body>
</html>
