<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#faf8ef"/><stop offset="100%" stop-color="#bbada0"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse"><rect width="78" height="78" fill="#cdc1b4" rx="8"/><rect width="74" height="74" x="2" y="2" fill="#eee4da" rx="6"/></pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)" opacity="0.2"/>
  <!-- Large decorative tiles -->
  <g filter="url(#glow)" opacity="0.35">
    <rect x="100" y="80" width="90" height="90" rx="10" fill="#eee4da"/>
    <text x="145" y="140" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="42" fill="#776e65">2048</text>
    <rect x="550" y="250" width="90" height="90" rx="10" fill="#ede0c8"/>
    <text x="595" y="310" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="36" fill="#776e65">1024</text>
    <rect x="300" y="280" width="70" height="70" rx="8" fill="#f2b179"/>
    <text x="335" y="325" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="28" fill="#f9f6f2">128</text>
    <rect x="620" y="60" width="60" height="60" rx="8" fill="#f59563"/>
    <text x="650" y="100" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="22" fill="#f9f6f2">64</text>
    <rect x="50" y="300" width="60" height="60" rx="8" fill="#f67c5f"/>
    <text x="80" y="340" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="22" fill="#f9f6f2">32</text>
  </g>
  <!-- Center watermark -->
  <text x="400" y="220" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="100" fill="#cdc1b4" opacity="0.15">2048</text>
  <text x="400" y="260" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#bbb" opacity="0.2" letter-spacing="6">SLIDE · COMBINE · REACH 2048</text>
</svg>