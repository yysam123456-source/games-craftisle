<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #faf8ef; font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: none; }
.container { width: 500px; max-width: 95vw; }
.heading { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.title { font-size: 60px; font-weight: bold; color: #776e65; }
.scores-container { display: flex; gap: 5px; }
.score-container, .best-container { background: #bbada0; color: white; padding: 8px 15px; border-radius: 6px; text-align: center; min-width: 80px; }
.score-container .label, .best-container .label { font-size: 11px; text-transform: uppercase; color: #eee4da; }
.score-container .value, .best-container .value { font-size: 22px; font-weight: bold; }
.above-game { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.game-intro { color: #776e65; font-size: 14px; }
.restart-button { background: #8f7a66; color: white; border: none; border-radius: 6px; padding: 8px 15px; cursor: pointer; font-weight: bold; font-size: 14px; }
.restart-button:hover { background: #9f8b77; }
.game-container { position: relative; background: #bbada0; border-radius: 6px; padding: 15px; touch-action: none; user-select: none; }
.grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; position: relative; z-index: 1; }
.grid-cell { aspect-ratio: 1; background: rgba(238,228,218,0.35); border-radius: 3px; }
.tile-container { position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px; z-index: 2; }
.tile { position: absolute; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 3px; transition: all 100ms ease-in-out; }
.tile-new { animation: appear 200ms; }
.tile-merged { animation: pop 200ms; }
@keyframes appear { 0% { opacity: 0; transform: scale(0); } 100% { opacity: 1; transform: scale(1); } }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
.game-message { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(238,228,218,0.73); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; }
.game-message.active { display: flex; }
.game-message p { font-size: 50px; font-weight: bold; color: #776e65; margin-bottom: 20px; }
.game-message .lower { display: flex; gap: 10px; }
.game-message a { background: #8f7a66; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; cursor: pointer; }
.game-explanation { margin-top: 10px; color: #776e65; font-size: 13px; text-align: center; }
.important { font-weight: bold; }
@media (max-width: 520px) { .container { padding: 10px; } .title { font-size: 40px; } .game-container { padding: 10px; } .grid-container { gap: 10px; } }
</style>
</head>
<body>
<div class="container">
  <div class="heading">
    <h1 class="title">2048</h1>
    <div class="scores-container">
      <div class="score-container"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="best-container"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>
  </div>
  <div class="above-game">
    <p class="game-intro">Join the numbers to get <strong>2048</strong>!</p>
    <a class="restart-button" id="restart-button">New Game</a>
  </div>
  <div class="game-container" id="game-container">
    <div class="game-message" id="game-message"><p></p><div class="lower"><a class="keep-playing-button" id="keep-playing">Keep going</a><a class="retry-button" id="retry-button">Try again</a></div></div>
    <div class="grid-container" id="grid-container">
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
    </div>
    <div class="tile-container" id="tile-container"></div>
  </div>
  <p class="game-explanation"><strong class="important">How to play:</strong> Use <strong>arrow keys</strong> or <strong>swipe</strong> to move tiles. When two tiles with the same number touch, they <strong>merge!</strong></p>
</div>

<script>

"use strict";
  
  const SIZE = 4;
  let grid = [];
  let score = 0;
  let best = parseInt(localStorage.getItem('best2048') || '0');
  let won = false;
  let over = false;
  let keepPlaying = false;
  
  const tileColors = {
    2: {bg: '#eee4da', color: '#776e65'},
    4: {bg: '#ede0c8', color: '#776e65'},
    8: {bg: '#f2b179', color: '#f9f6f2'},
    16: {bg: '#f59563', color: '#f9f6f2'},
    32: {bg: '#f67c5f', color: '#f9f6f2'},
    64: {bg: '#f65e3b', color: '#f9f6f2'},
    128: {bg: '#edcf72', color: '#f9f6f2'},
    256: {bg: '#edcc61', color: '#f9f6f2'},
    512: {bg: '#edc850', color: '#f9f6f2'},
    1024: {bg: '#edc53f', color: '#f9f6f2'},
    2048: {bg: '#edc22e', color: '#f9f6f2'},
    4096: {bg: '#3c3a32', color: '#f9f6f2'},
    8192: {bg: '#3c3a32', color: '#f9f6f2'},
  };
  
  function getColor(value) {
    if (tileColors[value]) return tileColors[value];
    return {bg: '#3c3a32', color: '#f9f6f2'};
  }
  
  function init() {
    grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
    score = 0;
    won = false;
    over = false;
    keepPlaying = false;
    document.getElementById('score').textContent = '0';
    document.getElementById('best').textContent = best;
    document.getElementById('game-message').classList.remove('active');
    addRandomTile();
    addRandomTile();
    render();
  }
  
  function addRandomTile() {
    const empty = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 0) empty.push({r, c});
    if (empty.length === 0) return;
    const {r, c} = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }
  
  function render() {
    const container = document.getElementById('tile-container');
    container.innerHTML = '';
    const cellSize = (container.parentElement.offsetWidth - 30 - (SIZE-1)*15) / SIZE;
    
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] !== 0) {
          const tile = document.createElement('div');
          const color = getColor(grid[r][c]);
          const fontSize = grid[r][c] >= 1024 ? cellSize * 0.4 : grid[r][c] >= 128 ? cellSize * 0.45 : cellSize * 0.55;
          tile.style.cssText = `
            width: ${cellSize}px; height: ${cellSize}px;
            top: ${r * (cellSize + 15)}px; left: ${c * (cellSize + 15)}px;
            background: ${color.bg}; color: ${color.color};
            font-size: ${fontSize}px;
            z-index: ${grid[r][c]};
          `;
          tile.className = 'tile';
          tile.textContent = grid[r][c];
          container.appendChild(tile);
        }
      }
    }
  }
  
  function move(direction) {
    if (over || (won && !keepPlaying)) return false;
    
    let moved = false;
    const oldGrid = grid.map(row => [...row]);
    
    if (direction === 0 || direction === 2) { // up or down
      for (let c = 0; c < SIZE; c++) {
        let col = [];
        for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
        col = mergeCol(col, direction === 2);
        for (let r = 0; r < SIZE; r++) grid[r][c] = col[r] || 0;
      }
    } else { // left or right
      for (let r = 0; r < SIZE; r++) {
        let row = [...grid[r]];
        row = mergeCol(row, direction === 1);
        grid[r] = row;
      }
    }
    
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] !== oldGrid[r][c]) moved = true;
    
    if (moved) {
      addRandomTile();
      if (score > best) { best = score; localStorage.setItem('best2048', best); document.getElementById('best').textContent = best; }
      render();
      checkGameState();
    }
    return moved;
  }
  
  function mergeCol(col, reverse) {
    let arr = col.filter(v => v !== 0);
    if (reverse) arr = arr.reverse();
    let result = [];
    for (let i = 0; i < arr.length; i++) {
      if (i + 1 < arr.length && arr[i] === arr[i+1]) {
        const val = arr[i] * 2;
        result.push(val);
        score += val;
        document.getElementById('score').textContent = score;
        i++; // skip next
      } else {
        result.push(arr[i]);
      }
    }
    while (result.length < SIZE) result.push(0);
    if (reverse) result = result.reverse();
    return result;
  }
  
  function checkGameState() {
    // check win
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 2048 && !won) {
          won = true;
          showMessage('You Win!', false);
          return;
        }
    // check lose
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] === 0) return; // can move
        if (r < SIZE-1 && grid[r][c] === grid[r+1][c]) return;
        if (c < SIZE-1 && grid[r][c] === grid[r][c+1]) return;
      }
    over = true;
    showMessage('Game Over!', true);
  }
  
  function showMessage(text, isGameOver) {
    const msg = document.getElementById('game-message');
    msg.querySelector('p').textContent = text;
    msg.classList.add('active');
  }
  
  // Keyboard
  document.addEventListener('keydown', (e) => {
    const map = {'ArrowUp':0,'ArrowDown':2,'ArrowLeft':3,'ArrowRight':1,'w':0,'s':2,'a':3,'d':1,'W':0,'S':2,'A':3,'D':1};
    if (map[e.key] !== undefined) { e.preventDefault(); move(map[e.key]); }
  });
  
  // Touch/Swipe
  let touchStartX, touchStartY;
  const container = document.getElementById('game-container');
  container.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive: true});
  container.addEventListener('touchend', (e) => {
    if (!touchStartX) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : 3);
    else move(dy > 0 ? 2 : 0);
    touchStartX = touchStartY = null;
  }, {passive: true});
  
  // Mouse drag (desktop)
  container.addEventListener('mousedown', (e) => {
    touchStartX = e.clientX; touchStartY = e.clientY;
  });
  container.addEventListener('mouseup', (e) => {
    if (!touchStartX) return;
    const dx = e.clientX - touchStartX;
    const dy = e.clientY - touchStartY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : 3);
    else move(dy > 0 ? 2 : 0);
    touchStartX = touchStartY = null;
  });
  
  // Buttons
  document.getElementById('restart-button').addEventListener('click', init);
  document.getElementById('retry-button').addEventListener('click', init);
  document.getElementById('keep-playing').addEventListener('click', () => {
    keepPlaying = true;
    document.getElementById('game-message').classList.remove('active');
  });
  
  init();

  // 监听父页面消息（允许外部控制游戏）
  window.addEventListener('message', (e) => {
    if (!e.data) return;
    if (e.data.type === 'keydown' && e.data.key) {
      const map = {'ArrowUp':0,'ArrowDown':2,'ArrowLeft':3,'ArrowRight':1,'w':0,'s':2,'a':3,'d':1,'W':0,'S':2,'A':3,'D':1};
      if (map[e.data.key] !== undefined) move(map[e.data.key]);
    }
    if (e.data.type === 'move' && e.data.direction !== undefined) move(e.data.direction);
    if (e.data.type === 'restart') init();
  });

  // 暴露游戏控制API（统一接口）
  window.game = {
    move: move,
    getScore: () => score,
    getGrid: () => grid,
    restart: init,
    getState: () => ({score, grid, gameOver, keepPlaying})
  };






</script>
</body>
</html>
