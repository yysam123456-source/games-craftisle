<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="planetGrad" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#7ec8e3"/>
      <stop offset="60%" stop-color="#4a9cc2"/>
      <stop offset="100%" stop-color="#2a6a8a"/>
    </radialGradient>
    <radialGradient id="cloudGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(200,220,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(200,220,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="40" cy="50" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="120" cy="30" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="200" cy="70" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="290" cy="40" r="1" fill="white" opacity="0.7"/>
  <circle cx="350" cy="80" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="60" cy="120" r="1.3" fill="white" opacity="0.8"/>
  <circle cx="330" cy="130" r="1.1" fill="white" opacity="0.6"/>
  <circle cx="150" cy="150" r="0.9" fill="white" opacity="0.7"/>
  <circle cx="260" cy="20" r="1.4" fill="white" opacity="0.9"/>
  <circle cx="380" cy="110" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="90" cy="200" r="1" fill="white" opacity="0.7"/>
  <circle cx="310" cy="180" r="1.2" fill="white" opacity="0.8"/>
  <!-- Planet (low-poly style) -->
  <g transform="translate(200,150)">
    <!-- Planet body -->
    <circle cx="0" cy="0" r="70" fill="url(#planetGrad)"/>
    <!-- Low-poly facets (simplified as segments) -->
    <path d="M-50,-40 Q-30,-55 -10,-50 Q10,-48 30,-52 Q45,-40 50,-25 Q55,-10 52,10 Q48,30 40,45 Q25,55 5,58 Q-15,55 -35,50 Q-50,35 -55,15 Q-58,-5 -55,-25 Q-52,-40 -50,-40Z" fill="rgba(120,200,230,0.15)" stroke="rgba(120,200,230,0.3)" stroke-width="1"/>
    <!-- Surface detail (low-poly bumps) -->
    <path d="M-30,-20 Q-20,-35 -5,-30 Q10,-25 20,-28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <path d="M-20,10 Q-5,0 10,5 Q25,10 35,8" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <path d="M-40,30 Q-25,20 -10,25 Q5,30 20,28" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Atmosphere glow -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="rgba(120,200,255,0.15)" stroke-width="3"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="rgba(120,200,255,0.08)" stroke-width="2"/>
  </g>
  <!-- Cloud layer (subtle) -->
  <ellipse cx="230" cy="120" rx="50" ry="18" fill="url(#cloudGrad)" opacity="0.5"/>
  <ellipse cx="180" cy="135" rx="40" ry="14" fill="url(#cloudGrad)" opacity="0.4"/>
  <!-- Tiny moon -->
  <circle cx="310" cy="90" r="8" fill="#c8dce8" opacity="0.7"/>
  <circle cx="310" cy="90" r="10" fill="none" stroke="rgba(200,220,232,0.2)" stroke-width="1.5"/>
  <!-- Title text -->
  <text x="200" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="white" letter-spacing="2">Messenger</text>
  <text x="200" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" letter-spacing="1">3D Planet Exploration</text>
</svg>
