<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Minefield grid -->
  <g transform="translate(95,30)">
    <!-- Cells background -->
    <rect x="0" y="0" width="210" height="180" fill="#bdbdbd" rx="4"/>
    <!-- Grid lines -->
    <line x1="35" y1="0" x2="35" y2="180" stroke="#999" stroke-width="1"/>
    <line x1="70" y1="0" x2="70" y2="180" stroke="#999" stroke-width="1"/>
    <line x1="105" y1="0" x2="105" y2="180" stroke="#999" stroke-width="1"/>
    <line x1="140" y1="0" x2="140" y2="180" stroke="#999" stroke-width="1"/>
    <line x1="175" y1="0" x2="175" y2="180" stroke="#999" stroke-width="1"/>
    <line x1="0" y1="36" x2="210" y2="36" stroke="#999" stroke-width="1"/>
    <line x1="0" y1="72" x2="210" y2="72" stroke="#999" stroke-width="1"/>
    <line x1="0" y1="108" x2="210" y2="108" stroke="#999" stroke-width="1"/>
    <line x1="0" y1="144" x2="210" y2="144" stroke="#999" stroke-width="1"/>
    <!-- Unrevealed cell (raised) -->
    <rect x="3" y="3" width="29" height="30" fill="#e0e0e0" rx="2" stroke="#aaa" stroke-width="1"/>
    <rect x="38" y="39" width="29" height="30" fill="#e0e0e0" rx="2" stroke="#aaa" stroke-width="1"/>
    <rect x="108" y="3" width="29" height="30" fill="#e0e0e0" rx="2" stroke="#aaa" stroke-width="1"/>
    <rect x="143" y="75" width="29" height="30" fill="#e0e0e0" rx="2" stroke="#aaa" stroke-width="1"/>
    <rect x="178" y="111" width="29" height="30" fill="#e0e0e0" rx="2" stroke="#aaa" stroke-width="1"/>
    <rect x="38" y="147" width="29" height="30" fill="#e0e0e0" rx="2" stroke="#aaa" stroke-width="1"/>
    <!-- Numbers revealed -->
    <rect x="3" y="39" width="29" height="30" fill="#d0d0d0" rx="2"/>
    <text x="17" y="62" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle" fill="#0000cc">1</text>
    <rect x="73" y="3" width="29" height="30" fill="#d0d0d0" rx="2"/>
    <text x="87" y="26" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle" fill="#00aa00">2</text>
    <rect x="73" y="75" width="29" height="30" fill="#d0d0d0" rx="2"/>
    <text x="87" y="98" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle" fill="#cc0000">3</text>
    <rect x="178" y="39" width="29" height="30" fill="#d0d0d0" rx="2"/>
    <text x="192" y="62" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle" fill="#0066cc">1</text>
    <!-- Flag -->
    <rect x="108" y="75" width="29" height="30" fill="#e0e0e0" rx="2" stroke="#aaa" stroke-width="1"/>
    <polygon points="117,83 132,88 117,93" fill="#ff5722"/>
    <line x1="122" y1="78" x2="122" y2="101" stroke="#666" stroke-width="1.5"/>
    <!-- Mine (exploded) -->
    <rect x="3" y="111" width="29" height="30" fill="#ffcccc" rx="2"/>
    <circle cx="17" cy="126" r="10" fill="#222"/>
    <line x1="12" y1="121" x2="22" y2="131" stroke="#fff" stroke-width="2"/>
    <line x1="22" y1="121" x2="12" y2="131" stroke="#fff" stroke-width="2"/>
    <!-- Spikes on mine -->
    <line x1="17" y1="114" x2="17" y2="118" stroke="#222" stroke-width="2"/>
    <line x1="17" y1="134" x2="17" y2="138" stroke="#222" stroke-width="2"/>
    <line x1="10" y1="126" x2="6" y2="126" stroke="#222" stroke-width="2"/>
    <line x1="24" y1="126" x2="28" y2="126" stroke="#222" stroke-width="2"/>
  </g>
  <!-- Title -->
  <text x="200" y="265" font-family="Arial,sans-serif" font-size="30" font-weight="bold" text-anchor="middle" fill="#444">💣 Minesweeper</text>
</svg>
