<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Snake body segments -->
  <circle cx="100" cy="80" r="18" fill="#53a8b6"/>
  <circle cx="135" cy="75" r="19" fill="#53a8b6"/>
  <circle cx="172" cy="82" r="20" fill="#0f3460"/>
  <circle cx="210" cy="78" r="21" fill="#0f3460"/>
  <circle cx="250" cy="85" r="22" fill="#0f3460"/>
  <circle cx="290" cy="80" r="23" fill="#0f3460"/>
  <!-- Eyes (head) -->
  <circle cx="283" cy="73" r="4" fill="white"/>
  <circle cx="297" cy="73" r="4" fill="white"/>
  <circle cx="283" cy="74" r="2" fill="#16213e"/>
  <circle cx="297" cy="74" r="2" fill="#16213e"/>
  <!-- Tongue -->
  <path d="M290 92 Q295 102 290 108 Q285 102 290 92" stroke="#e94560" stroke-width="3" fill="none"/>
  <!-- Food -->
  <circle cx="180" cy="180" r="14" fill="#e94560"/>
  <!-- Dots pattern -->
  <circle cx="230" cy="210" r="10" fill="#e94560" opacity="0.6"/>
  <circle cx="120" cy="200" r="10" fill="#e94560" opacity="0.6"/>
  <circle cx="310" cy="195" r="10" fill="#e94560" opacity="0.6"/>
  <!-- Title -->
  <text x="200" y="270" font-family="Arial,sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#e94560">🐍 Snake</text>
</svg>
