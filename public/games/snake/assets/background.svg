<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <radialGradient id="foodGlow"><stop offset="0%" stop-color="#ff4444" stop-opacity="0.7"/><stop offset="100%" stop-color="#ff4444" stop-opacity="0"/></radialGradient>
    <filter id="snakeGlow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#30363d" stroke-width="1" opacity="0.25">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/><line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="50" y1="0" x2="50" y2="450"/><line x1="100" y1="0" x2="100" y2="450"/><line x1="150" y1="0" x2="150" y2="450"/>
    <line x1="650" y1="0" x2="650" y2="450"/><line x1="700" y1="0" x2="700" y2="450"/><line x1="750" y1="0" x2="750" y2="450"/>
  </g>
  <!-- Large snake body -->
  <g filter="url(#snakeGlow)">
    <rect x="100" y="190" width="30" height="30" rx="7" fill="#238636" opacity="0.85"/>
    <rect x="132" y="190" width="30" height="30" rx="7" fill="#2ea043" opacity="0.87"/>
    <rect x="164" y="190" width="30" height="30" rx="7" fill="#3fb950" opacity="0.89"/>
    <rect x="196" y="190" width="30" height="30" rx="7" fill="#56d364" opacity="0.91"/>
    <rect x="228" y="190" width="30" height="30" rx="7" fill="#56d364" opacity="0.93"/>
    <rect x="260" y="190" width="30" height="30" rx="7" fill="#7ee787" opacity="0.95"/>
    <!-- Head -->
    <rect x="292" y="188" width="34" height="34" rx="8" fill="#7ee787"/>
    <circle cx="310" cy="198" r="4" fill="#fff"/><circle cx="318" cy="198" r="4" fill="#fff"/>
    <circle cx="310" cy="198" r="2" fill="#000"/><circle cx="318" cy="198" r="2" fill="#000"/>
    <!-- Tongue -->
    <line x1="326" y1="205" x2="340" y2="200" stroke="#ff6b6b" stroke-width="2"/>
    <line x1="340" y1="200" x2="338" y2="195" stroke="#ff6b6b" stroke-width="1.5"/>
    <line x1="340" y1="200" x2="338" y2="205" stroke="#ff6b6b" stroke-width="1.5"/>
  </g>
  <!-- Food -->
  <circle cx="420" cy="205" r="20" fill="url(#foodGlow)"/>
  <circle cx="420" y="207" r="12" fill="#ff4444"/>
  <circle cx="416" y="203" r="3" fill="#ff8888" opacity="0.7"/>
  <!-- Secondary food -->
  <circle cx="180" y="320" r="14" fill="url(#foodGlow)"/>
  <circle cx="180" y="321" r="8" fill="#ff4444"/>
  <text x="400" y="430" text-anchor="middle" font-family="monospace" font-size="14" fill="#3fb950" opacity="0.3" letter-spacing="10">SNAKE</text>
</svg>