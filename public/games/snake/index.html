<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 Snake</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
        }
        h1 { color: #4CAF50; margin-bottom: 10px; font-size: 28px; }
        #score { font-size: 18px; margin-bottom: 10px; color: #ffd700; }
        #gameCanvas { border: 2px solid #4CAF50; background: #111; }
        #controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
        }
        .ctrl-btn {
            background: #333;
            border: 1px solid #4CAF50;
            color: #4CAF50;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .ctrl-btn:active { background: #4CAF50; color: #000; }
        #up { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        #down { grid-column: 2; grid-row: 3; }
        #startBtn {
            margin-top: 15px;
            padding: 10px 30px;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        #startBtn:hover { background: #45a049; }
        #gameOver {
            display: none;
            position: absolute;
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #4CAF50;
        }
        #gameOver h2 { color: #ff4444; font-size: 32px; }
        #gameOver p { font-size: 20px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇 Snake</h1>
    <div id="score">得分: 0</div>
    <div style="position: relative;">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOver">
            <h2>游戏结束！</h2>
            <p id="finalScore"></p>
            <button id="restartBtn" style="padding:10px 30px; background:#4CAF50; color:#fff; border:none; border-radius:8px; font-size:16px; cursor:pointer;">重新开始</button>
        </div>
    </div>
    <div id="controls">
        <button class="ctrl-btn" id="up">↑</button>
        <button class="ctrl-btn" id="left">←</button>
        <button class="ctrl-btn" id="right">→</button>
        <button class="ctrl-btn" id="down">↓</button>
    </div>
    <button id="startBtn">开始游戏</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let dx = 0, dy = 0;
        let score = 0;
        let gameLoop = null;
        let gameStarted = false;

        function drawGame() {
            // 清空画布
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画网格
            ctx.strokeStyle = '#1a1a1a';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 画蛇
            snake.forEach((seg, idx) => {
                ctx.fillStyle = idx === 0 ? '#4CAF50' : '#8BC34A';
                ctx.fillRect(seg.x * gridSize + 1, seg.y * gridSize + 1, gridSize - 2, gridSize - 2);
                if (idx === 0) {
                    // 画眼睛
                    ctx.fillStyle = '#000';
                    const ex = seg.x * gridSize + 6, ey = seg.y * gridSize + 6;
                    if (dx !== 0 || dy === -1) { ctx.fillRect(ex-2, ey-2, 3, 3); ctx.fillRect(ex+6, ey-2, 3, 3); }
                    else if (dx !== 0 || dy === 1) { ctx.fillRect(ex-2, ey+6, 3, 3); ctx.fillRect(ex+6, ey+6, 3, 3); }
                    else { ctx.fillRect(ex-2, ey-2, 3, 3); ctx.fillRect(ex+6, ey-2, 3, 3); }
                }
            });

            // 画食物
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function moveSnake() {
            if (!gameStarted) return;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 撞墙
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return gameOver();
            // 撞自己
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) return gameOver();

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = '得分: ' + score;
                placeFood();
            } else {
                snake.pop();
            }

            drawGame();
        }

        function placeFood() {
            let newFood;
            do {
                newFood = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            } while (snake.some(seg => seg.x === newFood.x && seg.y === newFood.y));
            food = newFood;
        }

        function gameOver() {
            gameStarted = false;
            clearInterval(gameLoop);
            finalScoreEl.textContent = '最终得分: ' + score;
            gameOverEl.style.display = 'block';
        }

        function startGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 1; dy = 0;
            score = 0;
            scoreEl.textContent = '得分: 0';
            gameOverEl.style.display = 'none';
            placeFood();
            gameStarted = true;
            drawGame();
            clearInterval(gameLoop);
            gameLoop = setInterval(moveSnake, 120);
        }

        // 键盘控制
        document.addEventListener('keydown', e => {
            if (!gameStarted) return;
            if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && dy === 0) { dx = 0; dy = -1; }
            if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && dy === 0) { dx = 0; dy = 1; }
            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && dx === 0) { dx = -1; dy = 0; }
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && dx === 0) { dx = 1; dy = 0; }
        });

        // 触摸控制
        document.getElementById('up').addEventListener('click', () => { if (gameStarted && dy === 0) { dx = 0; dy = -1; } });
        document.getElementById('down').addEventListener('click', () => { if (gameStarted && dy === 0) { dx = 0; dy = 1; } });
        document.getElementById('left').addEventListener('click', () => { if (gameStarted && dx === 0) { dx = -1; dy = 0; } });
        document.getElementById('right').addEventListener('click', () => { if (gameStarted && dx === 0) { dx = 1; dy = 0; } });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        drawGame();
    </script>
</body>
</html>
