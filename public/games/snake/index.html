<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game - Play Free Online</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
    }
    .game-wrapper {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { 
      color: #333; 
      margin-bottom: 20px;
      font-size: 2.5em;
    }
    canvas { 
      border: 4px solid #333;
      background: #f0f0f0;
      border-radius: 10px;
      display: block;
      margin: 0 auto;
    }
    .score-board {
      margin-top: 20px;
      font-size: 1.5em;
      color: #667eea;
      font-weight: bold;
    }
    .instructions {
      margin-top: 15px;
      color: #666;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>🐍 Snake Game</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="score-board">Score: <span id="score">0</span></div>
    <div class="instructions">Use Arrow Keys to move. Eat food to grow. Don't hit walls or yourself!</div>
  </div>
  
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    
    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    
    let snake = [{x: 10, y: 10}];
    let dx = 0, dy = 0;
    let foodX, foodY;
    let score = 0;
    let gameLoop;
    
    function initGame() {
      snake = [{x: 10, y: 10}];
      dx = 1;
      dy = 0;
      score = 0;
      scoreElement.textContent = score;
      generateFood();
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(updateGame, 100);
    }
    
    function generateFood() {
      foodX = Math.floor(Math.random() * tileCount);
      foodY = Math.floor(Math.random() * tileCount);
    }
    
    function updateGame() {
      // Move snake
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};
      
      // Check collisions
      if (head.x < 0 || head.x >= tileCount || 
          head.y < 0 || head.y >= tileCount ||
          snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        gameOver();
        return;
      }
      
      snake.unshift(head);
      
      // Check food
      if (head.x === foodX && head.y === foodY) {
        score += 10;
        scoreElement.textContent = score;
        generateFood();
      } else {
        snake.pop();
      }
      
      drawGame();
    }
    
    function drawGame() {
      // Clear canvas
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw grid
      ctx.strokeStyle = '#e0e0e0';
      for (let i = 0; i < tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
      
      // Draw snake
      snake.forEach((segment, index) => {
        ctx.fillStyle = index === 0 ? '#4CAF50' : '#8BC34A';
        ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, 
                     gridSize - 2, gridSize - 2);
        ctx.strokeStyle = '#333';
        ctx.strokeRect(segment.x * gridSize + 1, segment.y * gridSize + 1, 
                        gridSize - 2, gridSize - 2);
      });
      
      // Draw food
      ctx.fillStyle = '#FF5722';
      ctx.beginPath();
      ctx.arc(foodX * gridSize + gridSize/2, foodY * gridSize + gridSize/2, 
               gridSize/2 - 2, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function gameOver() {
      clearInterval(gameLoop);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2 - 30);
      ctx.font = '24px Arial';
      ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
      ctx.fillText('Press Space to Restart', canvas.width / 2, canvas.height / 2 + 60);
    }
    
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        initGame();
        return;
      }
      
      switch(e.key) {
        case 'ArrowUp':
          if (dy === 0) { dx = 0; dy = -1; }
          break;
        case 'ArrowDown':
          if (dy === 0) { dx = 0; dy = 1; }
          break;
        case 'ArrowLeft':
          if (dx === 0) { dx = -1; dy = 0; }
          break;
        case 'ArrowRight':
          if (dx === 0) { dx = 1; dy = 0; }
          break;
      }
    });
    
    initGame();
  
    // 自动演示模式
    setTimeout(() => {
      if (window.location.search.indexOf('demo=0') >= 0) return;
      console.log('Snake auto demo started');
      setInterval(() => {
        // 随机改变方向（但不能直接反向）
        const directions = [
          {dx:1,dy:0},  // 右
          {dx:-1,dy:0}, // 左
          {dx:0,dy:1},   // 下
          {dx:0,dy:-1}   // 上
        ];
        const validDirs = directions.filter(d => {
          // 不能反向
          if (d.dx === -dx && d.dy === -dy) return false;
          // 不能撞墙
          const head = {x: snake[0].x + d.dx, y: snake[0].y + d.dy};
          if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return false;
          // 不能撞自己
          if (snake.some(seg => seg.x === head.x && seg.y === head.y)) return false;
          return true;
        });
        if (validDirs.length > 0) {
          const dir = validDirs[Math.floor(Math.random() * validDirs.length)];
          dx = dir.dx;
          dy = dir.dy;
        }
      }, 500);
    }, 1000);
  
// ===== 游戏操作指示器 =====
(function addIndicator() {
  if (window.__indicatorAdded) return;
  window.__indicatorAdded = true;

  // 注入 CSS 动画
  const style = document.createElement('style');
  style.textContent = `
    @keyframes __indicatorFlash {
      0%   { box-shadow: inset 0 0 0 9999px rgba(0,255,0,0.6); }
      100% { box-shadow: none; }
    }
    .__indicator-flash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 99999;
      animation: __indicatorFlash 0.4s ease-out;
    }
  `;
  document.head.appendChild(style);

  // 收到任何操作时闪绿光
  function flashIndicator() {
    const d = document.createElement('div');
    d.className = '__indicator-flash';
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 500);
  }

  // 监听所有操作事件
  document.addEventListener('keydown', flashIndicator, true);
  document.addEventListener('mousedown', flashIndicator, true);
  document.addEventListener('touchstart', flashIndicator, true);

  // 覆盖 window 关键函数，确保指示器一定触发
  if (typeof move === 'function') {
    const _origMove = move;
    window.move = function() { flashIndicator(); return _origMove.apply(this, arguments); };
  }
  if (typeof init === 'function') {
    const _origInit = init;
    window.init = function() { flashIndicator(); return _origInit.apply(this, arguments); };
  }

  console.log('✅ 游戏操作指示器已加载');
})();

</script>
</body>
</html>
