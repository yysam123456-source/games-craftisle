<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game - Play Free Online</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: auto; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
    }
    .game-wrapper {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { 
      color: #333; 
      margin-bottom: 20px;
      font-size: 2.5em;
    }
    canvas { 
      border: 4px solid #333;
      background: #f0f0f0;
      border-radius: 10px;
      display: block;
      margin: 0 auto;
    }
    .score-board {
      margin-top: 20px;
      font-size: 1.5em;
      color: #667eea;
      font-weight: bold;
    }
    .instructions {
      margin-top: 15px;
      color: #666;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>🐍 Snake Game</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="score-board">Score: <span id="score">0</span></div>
    <div class="instructions">Use Arrow Keys to move. Eat food to grow. Don't hit walls or yourself!</div>
  </div>
  
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    
    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    
    let snake = [{x: 10, y: 10}];
    let dx = 0, dy = 0;
    let foodX, foodY;
    let score = 0;
    let gameLoop;
    
    function initGame() {
      snake = [{x: 10, y: 10}];
      dx = 1;
      dy = 0;
      score = 0;
      scoreElement.textContent = score;
      generateFood();
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(updateGame, 100);
    }
    
    function generateFood() {
      foodX = Math.floor(Math.random() * tileCount);
      foodY = Math.floor(Math.random() * tileCount);
    }
    
    function updateGame() {
      // Move snake
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};
      
      // Check collisions
      if (head.x < 0 || head.x >= tileCount || 
          head.y < 0 || head.y >= tileCount ||
          snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        gameOver();
        return;
      }
      
      snake.unshift(head);
      
      // Check food
      if (head.x === foodX && head.y === foodY) {
        score += 10;
        scoreElement.textContent = score;
        generateFood();
      } else {
        snake.pop();
      }
      
      drawGame();
    }
    
    function drawGame() {
      // Clear canvas
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw grid
      ctx.strokeStyle = '#e0e0e0';
      for (let i = 0; i < tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
      
      // Draw snake
      snake.forEach((segment, index) => {
        ctx.fillStyle = index === 0 ? '#4CAF50' : '#8BC34A';
        ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, 
                     gridSize - 2, gridSize - 2);
        ctx.strokeStyle = '#333';
        ctx.strokeRect(segment.x * gridSize + 1, segment.y * gridSize + 1, 
                        gridSize - 2, gridSize - 2);
      });
      
      // Draw food
      ctx.fillStyle = '#FF5722';
      ctx.beginPath();
      ctx.arc(foodX * gridSize + gridSize/2, foodY * gridSize + gridSize/2, 
               gridSize/2 - 2, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function gameOver() {
      clearInterval(gameLoop);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2 - 30);
      ctx.font = '24px Arial';
      ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
      ctx.fillText('Press Space to Restart', canvas.width / 2, canvas.height / 2 + 60);
    }
    
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        initGame();
        return;
      }
      
      switch(e.key) {
        case 'ArrowUp':
          if (dy === 0) { dx = 0; dy = -1; }
          break;
        case 'ArrowDown':
          if (dy === 0) { dx = 0; dy = 1; }
          break;
        case 'ArrowLeft':
          if (dx === 0) { dx = -1; dy = 0; }
          break;
        case 'ArrowRight':
          if (dx === 0) { dx = 1; dy = 0; }
          break;
      }
    });
    
    initGame();
  


// Auto-resize iframe to fit game content perfectly
(function() {
  function sendHeight() {
    var h = Math.max(
      document.body.scrollHeight,
      document.documentElement.scrollHeight,
      document.body.offsetHeight,
      document.documentElement.offsetHeight,
      document.body.clientHeight
    );
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'game-resize', height: h + 20 }, '*');
    }
  }
  // Send height on load, after short delay for rendering
  setTimeout(sendHeight, 100);
  setTimeout(sendHeight, 500);
  setTimeout(sendHeight, 1000);
  // Also send on resize and DOM changes
  window.addEventListener('resize', sendHeight);
  if (typeof MutationObserver !== 'undefined') {
    var observer = new MutationObserver(function() {
      clearTimeout(observer._timer);
      observer._timer = setTimeout(sendHeight, 200);
    });
    observer.observe(document.documentElement || document.body, { 
      childList: true, subtree: true, attributes: true 
    });
  }
})();

</script>
</body>
</html>
